<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1b1030" />
<title>Crabby World: The Colour Rescue</title>
<style>
  :root { --ui: #fff2c4; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #1b1030; color: var(--ui);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none; touch-action: none;
  }
  #wrap { position: fixed; inset: 0; }
  canvas {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    display: block;
    image-rendering: pixelated; image-rendering: crisp-edges;
    touch-action: none;
  }
  /* World layer desaturates to show the stolen colour; foreground stays full colour.
     The filter is animated per-frame in JS (Colour Tide), so no CSS transition. */
  #world { z-index: 1; }
  #game  { z-index: 2; }

  /* ---- On-screen touch controls ---- */
  #controls { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
  .pad {
    position: absolute; bottom: max(18px, env(safe-area-inset-bottom));
    display: flex; align-items: flex-end; gap: 14px; pointer-events: none;
  }
  #padL { left: max(16px, env(safe-area-inset-left)); }
  #padR { right: max(16px, env(safe-area-inset-right)); }
  .btn {
    pointer-events: auto; width: 74px; height: 74px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; font-weight: 800; color: #2a1546;
    background: rgba(255,255,255,0.55);
    border: 3px solid rgba(255,255,255,0.85);
    box-shadow: 0 4px 0 rgba(0,0,0,0.25), inset 0 3px 8px rgba(255,255,255,0.6);
    backdrop-filter: blur(2px);
  }
  #jump { width: 96px; height: 96px; font-size: 22px; background: rgba(255,214,102,0.75); border-color: #ffe9a8; }
  #claw { width: 76px; height: 76px; font-size: 16px; color: #5a1e10; background: rgba(255,138,80,0.8); border-color: #ffcaa0; }
  .btn.press { transform: translateY(3px) scale(0.96); box-shadow: 0 1px 0 rgba(0,0,0,0.25), inset 0 3px 8px rgba(255,255,255,0.6); background: rgba(255,255,255,0.85); }

  /* ---- Overlays (title / win / lose) ---- */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; gap: 14px;
    background: radial-gradient(120% 120% at 50% 0%, #3a1e63 0%, #1b1030 70%);
  }
  .screen.hidden { display: none; }
  .title { font-size: clamp(28px, 7vw, 52px); font-weight: 900; letter-spacing: 0.5px;
    background: linear-gradient(180deg,#ffe58a,#ff9d3c 60%,#ff5f8d);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 3px 0 rgba(0,0,0,0.15); line-height: 1.05; }
  .sub { font-size: clamp(14px, 3.6vw, 20px); opacity: 0.92; max-width: 30ch; line-height: 1.4; }
  .big-emoji { font-size: clamp(56px, 16vw, 120px); filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4)); }
  .play {
    pointer-events: auto; margin-top: 8px; cursor: pointer;
    font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: #3a1030;
    padding: 14px 40px; border: none; border-radius: 999px;
    background: linear-gradient(180deg,#ffe58a,#ffb347);
    box-shadow: 0 6px 0 #b5651d, 0 10px 20px rgba(0,0,0,0.35);
  }
  .play:active { transform: translateY(4px); box-shadow: 0 2px 0 #b5651d, 0 6px 12px rgba(0,0,0,0.35); }
  .hint { font-size: 13px; opacity: 0.7; margin-top: 6px; }
  .stat { font-size: clamp(16px,4vw,22px); font-weight: 700; }

  /* ---- Title & character select ---- */
  .splash { position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; image-rendering: pixelated; }
  .splash-shade { position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(20,10,35,0.30) 0%, rgba(20,10,35,0.10) 35%, rgba(20,10,35,0.72) 100%); }
  .splash-shade.heavy { background: rgba(16,8,30,0.78); }
  .title-stack { position: relative; display: flex; flex-direction: column;
    align-items: center; gap: 12px; width: 100%; }
  .logo { display: flex; flex-direction: column; align-items: center; line-height: 0.92;
    filter: drop-shadow(0 5px 0 rgba(40,18,5,0.55)) drop-shadow(0 10px 18px rgba(0,0,0,0.45)); }
  .logo-line1, .logo-line2 { font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(180deg, #ffe58a 15%, #ff9d3c 55%, #e8542f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    -webkit-text-stroke: 2px #4d2408; }
  .logo-line1 { font-size: clamp(44px, 13vw, 92px); }
  .logo-line2 { font-size: clamp(56px, 17vw, 120px);
    background: linear-gradient(180deg, #b8f27f 10%, #3ddc84 55%, #1f9e5c 100%);
    -webkit-background-clip: text; background-clip: text; }
  .tagline { font-size: clamp(14px, 4vw, 22px); font-weight: 800; color: #ffe9a8;
    text-shadow: 0 2px 0 rgba(40,18,5,0.6); }
  .pick-title { font-size: clamp(22px, 6vw, 40px); font-weight: 900; color: #ffe9a8;
    letter-spacing: 1px; text-shadow: 0 3px 0 rgba(40,18,5,0.6); }
  .char-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px; width: min(430px, 90vw); }
  @media (min-aspect-ratio: 5/4) { .char-grid { grid-template-columns: repeat(4, 1fr); width: min(640px, 94vw); } }
  .char-card { pointer-events: auto; cursor: pointer; position: relative;
    border-radius: 16px; padding: 10px 6px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.08); border: 3px solid rgba(255,255,255,0.18);
    transition: transform 0.12s ease; }
  .char-card .face { width: 74px; height: 74px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    background: radial-gradient(120% 120% at 50% 25%, #6fc8ff 0%, #2f86c9 100%); font-size: 40px; }
  .char-card .face canvas, .char-card .face img { width: 100%; height: 100%;
    object-fit: contain; image-rendering: pixelated; }
  .char-card .cname { font-weight: 900; font-size: 14px; }
  .char-card .ctag { font-size: 10px; opacity: 0.75; }
  .char-card.selected { border-color: #ffd23f;
    background: rgba(255,210,63,0.16);
    box-shadow: 0 0 0 3px rgba(255,210,63,0.35), 0 6px 18px rgba(0,0,0,0.35);
    transform: scale(1.04); }
  .char-card.locked { cursor: default; }
  .char-card.locked .face { filter: grayscale(1) brightness(0.75); }
  .char-card.locked .cname { opacity: 0.65; }
  .char-card .lock { position: absolute; top: 6px; right: 8px; font-size: 16px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.6)); }
  .char-card.shake { animation: cardshake 0.3s; }
  @keyframes cardshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

  /* ---- Shop ---- */
  .shop-bank { font-size: clamp(15px,4vw,20px); font-weight: 800; color: #ffd23f; }
  .shop-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px;
    width: min(440px, 92vw); }
  .shop-card { pointer-events: auto; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.18);
    border-radius: 14px; padding: 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .shop-card .ic { font-size: 30px; line-height: 1; }
  .shop-card .nm { font-weight: 800; font-size: 14px; }
  .shop-card .dc { font-size: 11px; opacity: 0.75; text-align: center; min-height: 26px; }
  .shop-card .pips { display: flex; gap: 3px; }
  .shop-card .pip { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.2); }
  .shop-card .pip.on { background: #3ddc84; }
  .buy { pointer-events: auto; cursor: pointer; border: none; border-radius: 999px; font-weight: 800;
    font-size: 13px; padding: 7px 14px; color: #3a1030; background: linear-gradient(180deg,#ffe58a,#ffb347);
    box-shadow: 0 3px 0 #b5651d; }
  .buy:active { transform: translateY(2px); box-shadow: 0 1px 0 #b5651d; }
  .buy:disabled { background: #6b6474; color: #b8b2c2; box-shadow: 0 3px 0 #47414f; cursor: default; }
  .buy.max { background: #3ddc84; color: #123; box-shadow: 0 3px 0 #227a49; }
</style>
</head>
<body>
  <div id="wrap"><canvas id="world"></canvas><canvas id="game"></canvas></div>

  <!-- Touch controls -->
  <div id="controls">
    <div class="pad" id="padL">
      <div class="btn" id="left">◀</div>
      <div class="btn" id="right">▶</div>
    </div>
    <div class="pad" id="padR">
      <div class="btn" id="claw">CLAW</div>
      <div class="btn" id="jump">JUMP</div>
    </div>
  </div>

  <!-- Title screen -->
  <div class="screen" id="titleScreen">
    <img class="splash" id="splashImg" alt="" />
    <div class="splash-shade"></div>
    <div class="title-stack">
      <div class="logo">
        <span class="logo-line1">CRABBY</span>
        <span class="logo-line2">WORLD</span>
      </div>
      <div class="tagline">🍉 The Colour Rescue 🍉</div>
      <button class="play" id="startBtn">START ▶</button>
      <div class="hint">Bring the colour back to Crabby World!</div>
    </div>
  </div>

  <!-- Character select -->
  <div class="screen hidden" id="charScreen">
    <img class="splash" id="charSplash" alt="" />
    <div class="splash-shade heavy"></div>
    <div class="title-stack">
      <div class="pick-title">CHOOSE YOUR CRAB</div>
      <div class="char-grid" id="charGrid"></div>
      <button class="play" id="charStart">GO! ▶</button>
      <div class="hint">More crabs join once the colour is rescued…</div>
    </div>
  </div>

  <!-- Shop screen (between levels) -->
  <div class="screen hidden" id="shopScreen">
    <div class="title" style="font-size:clamp(24px,6vw,42px)">CRAB SHOP</div>
    <div class="shop-bank">🍉 <span id="shopMelons">0</span> watermelons</div>
    <div id="shopItems" class="shop-grid"></div>
    <button class="play" id="shopContinue">CONTINUE ▶</button>
  </div>

  <!-- End screen (win/lose) -->
  <div class="screen hidden" id="endScreen">
    <div class="big-emoji" id="endEmoji">🎉</div>
    <div class="title" id="endTitle">You did it!</div>
    <div class="stat" id="endStat"></div>
    <div class="sub" id="endSub"></div>
    <button class="play" id="againBtn">PLAY AGAIN ▶</button>
  </div>

<script>
"use strict";
/* ============================================================
   CRABBY WORLD: The Colour Rescue
   A tiny mobile-friendly 2D platformer.
   - Hero: Pinny, a one-eyed pineapple crab.
   - Enemies: grey crabs that drain the world's colour.
   - Core theme: the more grey crabs you defeat, the more the
     world's colour returns (global canvas saturation).
   Everything is drawn with canvas primitives — no assets.
   ============================================================ */

const worldCanvas = document.getElementById('world');
const fgCanvas = document.getElementById('game');
const worldCtx = worldCanvas.getContext('2d');
const fgCtx = fgCanvas.getContext('2d');
// `ctx` is the current draw target. The world layer is desaturated to express
// the stolen colour; the foreground layer (Pinny + colourful bursts + HUD)
// always stays at full colour, so Pinny never goes grey.
let ctx = worldCtx;

// Internal (virtual) resolution — the game world is drawn at this size,
// then the canvas is scaled up with CSS to fill the phone screen.
// Orientation-aware: landscape plays 480x270; portrait matches the phone's
// real aspect (270 wide, height to fit) so the screen is filled edge to edge,
// and reserves a control deck at the bottom so gameplay never hides under the
// touch buttons (resize() keeps all of it in sync).
let VW = 480, VH = 270;
let ctrlPad = 0;               // virtual px reserved for the button deck (portrait only)
const TILE = 24;               // tile size in world pixels
const GRAV = 0.55;
const MOVE = 0.7, MAXVX = 3.2, FRICT = 0.82;
const JUMP_V = 9.6;
const MAX_LIVES = 5;           // heart pickups can top up to this many lives

worldCanvas.width = fgCanvas.width = VW; worldCanvas.height = fgCanvas.height = VH;

// --- Fit the canvas to the screen while keeping aspect ratio ---
// Portrait phones get a 270x480 virtual screen (fills the display); landscape
// keeps 480x270. The world/camera adapt automatically.
function resize() {
  const availW = window.innerWidth, availH = window.innerHeight;
  const portrait = availH > availW;
  let nw, nh;
  if (portrait) {
    nw = 270;
    nh = Math.max(420, Math.min(620, Math.round(270 * availH / availW)));  // fill the real aspect
    ctrlPad = 96;
  } else {
    nw = 480; nh = 270; ctrlPad = 0;
  }
  if (nw !== VW || nh !== VH) {
    VW = nw; VH = nh;
    worldCanvas.width = fgCanvas.width = VW;
    worldCanvas.height = fgCanvas.height = VH;
  }
  const scale = Math.min(availW / VW, availH / VH);
  const w = Math.floor(VW * scale) + 'px', h = Math.floor(VH * scale) + 'px';
  worldCanvas.style.width = fgCanvas.style.width = w;
  worldCanvas.style.height = fgCanvas.style.height = h;
}
window.addEventListener('resize', resize);
resize();

/* ------------------------------------------------------------------
   GENERATED ART (Higgsfield, styled on the creator's hybrid-crab photos).
   Sprites/backgrounds load at runtime from the CDN; sprites are chroma-
   keyed in-canvas (models can't output alpha). If a download or CORS
   read fails — offline, strict CSP, sandbox — the game silently keeps
   its code-drawn art, so it is always playable. See game/assets.json.
   ------------------------------------------------------------------ */
const ART_SPRITES = {
  // key = the solid backdrop colour each sprite was generated on
  pinny:  { url:'https://d8j0ntlcm91z4.cloudfront.net/user_3G9WxhGTixsNfzfeyuvKzzFTG9O/hf_20260707_045118_a7e802a5-ed24-4989-8e2d-9f01fa17d6b1.png', key:[0,0,255] },
  grey:   { url:'https://d8j0ntlcm91z4.cloudfront.net/user_3G9WxhGTixsNfzfeyuvKzzFTG9O/hf_20260707_045126_8f9d7ad8-efff-453a-b1fe-bfafe7d79571.png', key:[255,0,255] },
  sucker: { url:'https://d8j0ntlcm91z4.cloudfront.net/user_3G9WxhGTixsNfzfeyuvKzzFTG9O/hf_20260707_045129_5d5c5a90-23b9-41e8-9baa-46ad88a55932.png', key:[0,255,0] },
  flower: { url:'https://d8j0ntlcm91z4.cloudfront.net/user_3G9WxhGTixsNfzfeyuvKzzFTG9O/hf_20260707_045123_9da3a942-9ed3-41be-bd9c-1f65a012bcda.png', key:[255,0,255] },
};
const ART_BGS = {   // theme index -> painted parallax backdrop
  0: 'https://d8j0ntlcm91z4.cloudfront.net/user_3G9WxhGTixsNfzfeyuvKzzFTG9O/hf_20260707_045133_8ac0ceaf-04b6-49e8-b473-365594b619ad.png',
  4: 'https://d8j0ntlcm91z4.cloudfront.net/user_3G9WxhGTixsNfzfeyuvKzzFTG9O/hf_20260707_045135_592a1971-79c5-4607-adda-cbb74f15521f.png',
};
const sprites = {}, bgArt = {};

// Remove the backdrop colour (including enclosed pockets) and trim to content.
// Image models never paint the *exact* key colour we asked for, so the real
// backdrop is sampled from the image corners and keyed with a tolerance,
// followed by a fringe pass that eats the leftover halo around the sprite.
function chromaKey(img, key) {
  const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
  const g = c.getContext('2d'); g.drawImage(img, 0, 0);
  let d;
  try { d = g.getImageData(0, 0, c.width, c.height); }
  catch (e) { return null; }                          // CORS-tainted: give up, use code art
  const W = c.width, H = c.height, px = d.data;

  // sample the actual backdrop from the four corners
  let kr = 0, kg = 0, kb = 0;
  for (const [sx, sy] of [[2,2],[W-3,2],[2,H-3],[W-3,H-3]]) {
    const i = (sy*W + sx) * 4; kr += px[i]; kg += px[i+1]; kb += px[i+2];
  }
  kr /= 4; kg /= 4; kb /= 4;
  // sanity: corners should roughly agree with the requested key; if the model
  // ignored the backdrop request entirely, keying would destroy the image.
  const dk = (kr-key[0])**2 + (kg-key[1])**2 + (kb-key[2])**2;
  if (dk > 150*150) return null;

  const HARD = 115*115;                               // main key pass
  for (let i = 0; i < px.length; i += 4) {
    const dr = px[i]-kr, dg = px[i+1]-kg, db = px[i+2]-kb;
    if (dr*dr + dg*dg + db*db < HARD) px[i+3] = 0;
  }
  // fringe pass: near-key pixels touching transparency get cleared too
  const SOFT = 175*175;
  for (let pass = 0; pass < 2; pass++) {
    for (let y = 1; y < H-1; y++) for (let x = 1; x < W-1; x++) {
      const i = (y*W + x) * 4;
      if (px[i+3] === 0) continue;
      const dr = px[i]-kr, dg = px[i+1]-kg, db = px[i+2]-kb;
      if (dr*dr + dg*dg + db*db >= SOFT) continue;
      if (px[i-4+3] === 0 || px[i+4+3] === 0 || px[i-W*4+3] === 0 || px[i+W*4+3] === 0) px[i+3] = 0;
    }
  }
  // trim to content
  let minX = W, minY = H, maxX = 0, maxY = 0;
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    if (px[(y*W + x)*4 + 3] > 0) {
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
  }
  if (maxX <= minX || maxY <= minY) return null;
  g.putImageData(d, 0, 0);
  const t = document.createElement('canvas');
  t.width = maxX - minX + 1; t.height = maxY - minY + 1;
  t.getContext('2d').drawImage(c, minX, minY, t.width, t.height, 0, 0, t.width, t.height);
  return t;
}

function loadArt() {
  for (const [name, s] of Object.entries(ART_SPRITES)) {
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => { const k = chromaKey(img, s.key); if (k) sprites[name] = k; };
    img.onerror = () => {};                            // keep code-drawn fallback
    img.src = s.url;
  }
  for (const [idx, url] of Object.entries(ART_BGS)) {
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => { bgArt[idx] = img; };
    img.onerror = () => {};
    img.src = url;
  }
}
loadArt();

/* ------------------------------------------------------------------
   LEVELS
   Legend:
     X = solid ground/block   . = empty
     P = player start         G = grey crab enemy
     o = watermelon           H = heart (extra life)
     F = finish flag          B = boss
   ------------------------------------------------------------------ */
const LEVELS = [
  // Level 1: Crabby Cove
  [
    "..............................................",
    "..............................................",
    "..............o.....o.........................",
    "............XXXXX..........o...........F......",
    ".................o......XXXX.........XXXXX....",
    "....P......o..........................X.......",
    "..XXXX...XXX......G.........G.....G....X......",
    "..X..............................XXX..X.......",
    "..X....o..o...XXXXXXX....XXXX..........X......",
    "..X..XXXXXX..........G..............G..X......",
    "XXXX........XX..............XXXXXXXXXXXX......",
    "X.........H.........G.........................",
    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  ],
  // Level 2: Tide Pools
  [
    "...................................................",
    ".........o.o.o.....................................",
    ".......XXXXXXX.........o......o..........F.........",
    "...................XXXXXX...XXXXXX....XXXXX........",
    "...P.....G.....G.......................X...........",
    ".XXXXX..XXX...XXX..G........G.....G....X...........",
    ".X..........................XXX.XXX...X............",
    ".X...o...........o....o...............X............",
    ".X..XXXX......G..XXX..XXX......G..G....X...........",
    ".X..........XXX...............XXXX.....X...........",
    ".X..o..............G.....................X.........",
    ".XXXX...XXXX....XXXXXXX...G......XXXXXXXXXX........",
    ".X........H.............XXXX.......................",
    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  ],
  // Level 3: Palm Cove
  [
    "...............................................",
    "...............................................",
    "...............................................",
    "...............................................",
    "...............................................",
    "...............................................",
    "...............................................",
    "...................o...........................",
    ".................XXXX..........................",
    ".......XXXX................XXXX.............o..",
    "...XXXX........XXXX....XXXX........XXXXX.......",
    "..P...G..H..G..N...G......G....G.......F.......",
    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  ],
  // Level 4: Rocky Steps
  [
    "..............................................",
    "..............................................",
    "..............................................",
    "..............................................",
    "..............................................",
    "..............................................",
    "..........................o...................",
    "........................XXXXX.................",
    ".................XXXX.........................",
    "..........XXXX................................",
    "...XXXX........XXXX....XXXX.......XXXX........",
    "..P....G..H...G.......G......G.....G....F.....",
    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
    "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  ],
  // Level 5: Grey Gauntlet
  [
    "..............................................",
    "..............................................",
    "..............................................",
    "..............................................",
    "..............................................",
    "..............................................",
    "..............................................",
    ".........o.........o.........o................",
    ".......XXXX.......XXXX.......XXXX.............",
    "..............................................",
    "....XXXX......XXXX......XXXX......XXXX........",
