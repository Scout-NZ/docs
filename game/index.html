// --- Game state ---
let level, solids, enemies, fruits, hearts, flag, player, cam, theme, boss, projectiles;
let totalGrey, greyLeft, score, melons, lives, levelIndex, running, particles;
let timeT, bannerT, ambient, solidSet, nests;
let upg = { jump: 0, claw: 0, speed: 0, colour: 0 };   // upgrade levels bought in the shop

/* ------------------------------------------------------------------
   COLOUR TIDE — the core system. A continuous 0..1 value per level:
     rises  : stomps/claws on crabs, watermelons, destroying grey nests
     drains : while Paint-Sucker crabs or Grey Nests are alive; on hits
   Four states: GREY (<0.25) · FADED (<0.55) · COLOURFUL (≥0.55) ·
   RAINBOW RUSH (timed bonus when the level is fully stabilised).
   The world visibly wakes up as the tide rises; the pineapple crab is
   the source of colour and never greys out.
   ------------------------------------------------------------------ */
let tide = 0, tideVis = 0, graceT = 0, killGain = 0.1, stabilised = false;
let rush = 0, rushUsed = false;

function gainTide(v) {
  tide = clampv(tide + v, 0, 1);
  if (v > 0) graceT = 90;              // drain pauses briefly after every gain
}
function tState() {                     // 0 grey · 1 faded · 2 colourful · 3 rush
  if (rush > 0) return 3;
  return tide < 0.25 ? 0 : tide < 0.55 ? 1 : 2;
}
const TIDE_NAMES = ['GREY', 'FADED', 'COLOURFUL', 'RAINBOW RUSH!'];
const TIDE_COLS  = ['#b9bec6', '#ffd97a', '#7de6a0', '#fff'];
function addScore(n) { score += rush > 0 ? n * 2 : n; }   // rush doubles points

function buildLevel(idx) {
  const map = LEVELS[idx];
  theme = THEMES[idx] || THEMES[THEMES.length - 1];
  solids = []; enemies = []; fruits = []; hearts = []; flag = null; boss = null; particles = []; projectiles = []; nests = [];
  let gi = 0; // crab index, used to cycle through this world's crab kinds
  for (let r = 0; r < map.length; r++) {
    for (let c = 0; c < map[r].length; c++) {
      const ch = map[r][c];
      const x = c * TILE, y = r * TILE;
      if (ch === 'X') solids.push({ x, y, w: TILE, h: TILE });
      else if (ch === 'P') player = makePlayer(x, y);
      else if (ch === 'G') { enemies.push(makeCrab(x, y, theme.kinds[gi % theme.kinds.length])); gi++; }
      else if (ch === 'o') fruits.push({ x: x + TILE/2, y: y + TILE/2, r: 7, got: false, bob: Math.random()*6.28 });
      else if (ch === 'H') hearts.push({ x: x + TILE/2, y: y + TILE/2, got: false, bob: Math.random()*6.28 });
      else if (ch === 'F') flag = { x: x + 4, y: y - TILE, w: 8, h: TILE*2 };
      else if (ch === 'B') boss = makeBoss(x, y);
      else if (ch === 'N') nests.push({ x: x+2, y: y+8, w: 20, h: 16, hp: 3, maxhp: 3,
                                        flash: 0, pulse: Math.random()*6.28, spawnT: 300, dead: false });
    }
  }
  level = { w: map[0].length * TILE, h: map.length * TILE };
  solidSet = new Set(solids.map(s => (s.x/TILE) + ',' + (s.y/TILE)));   // neighbour lookups for tile art
  ambient = [];
  for (let i = 0; i < 26; i++)
    ambient.push({ x: Math.random()*level.w, y: Math.random()*level.h, ph: Math.random()*6.28, sp: Math.random() });
  totalGrey = enemies.length; greyLeft = enemies.length;
  cam = { x: 0, y: 0 };
  timeT = 0; bannerT = 120;   // per-level timer + level-name banner

  // Colour Tide setup: worlds start drained; the Colour Boost upgrade gives a
  // brighter start. Each defeated crab restores an equal share of the tide.
  tide = boss ? 0 : clampv(0.04 + upg.colour * 0.15, 0, 0.5);
  tideVis = tide; graceT = 0; stabilised = false; rush = 0; rushUsed = false;
  killGain = 0.9 / Math.max(1, totalGrey + nests.length * 2);
  fruits.forEach((f, i) => { f.hidden = (i % 3 === 2); });   // some fruit only appears at COLOURFUL
}

function makePlayer(x, y) {
  return { x, y, w: 18, h: 18, vx: 0, vy: 0, onGround: false, face: 1, blink: 0, hurt: 0, walk: 0, atk: 0, atkCd: 0,
           squash: 0, wasGround: false };
}
function makeCrab(x, y, kind) {
  kind = kind || 'grey';
  return { x: x+3, y: y+6, w: 18, h: 14, kind, vx: (Math.random()<.5?-1:1)*0.7,
           dead: false, wig: Math.random()*6.28, homeMin: x-TILE*2, homeMax: x+TILE*3,
           hp: kind === 'crate' ? 2 : 1, hitFlash: 0,      // crate crabs are armoured
           onG: false, dir: 1,
           shootCd: 90 + Math.random()*140,                 // projectile timer (shooters)
           lungeCd: 90 + Math.random()*120, windup: 0, charge: 0 }; // lunge timers (chargers)
}
function makeBoss(x, y) {
  // General Ashclaw — big spiky crab. Beaten by 6 stomps/claws.
  return { x: x-12, y: y-24, w: 42, h: 30, vx: 1.1, vy: 0, hp: 6, maxhp: 6,
           hurt: 0, dead: false, wig: 0, shootCd: 150, name: 'GENERAL ASHCLAW' };
}

// A crab attack projectile (pinch / pollen / spore).
function fireProjectile(c, dir) {
  const cx = c.x + c.w/2, cy = c.y + c.h/2;
  if (c.kind === 'red')
    projectiles.push({ x:cx+dir*8, y:cy,   vx:dir*2.4, vy:0,    g:0,    kind:'pinch',  r:4, life:150, bob:0 });
  else if (c.kind === 'flower')
    projectiles.push({ x:cx+dir*8, y:cy-2, vx:dir*1.4, vy:0,    g:0,    kind:'pollen', r:4, life:180, bob:Math.random()*6.28 });
  else if (c.kind === 'mushroom')
    projectiles.push({ x:cx+dir*6, y:cy-4, vx:dir*0.8, vy:-1.4, g:0.03, kind:'spore',  r:4, life:210, bob:Math.random()*6.28 });
}

// Hurt a crab (stomp or claw). dir = knockback direction, 0 = none.
// Armoured crabs (crate) survive the first hit and flash instead.
function damageCrab(c, dir) {
  c.hp--;
  if (c.hp <= 0) {
    c.dead = true; greyLeft--; addScore(150);
    gainTide(killGain * (c.kind === 'sucker' ? 1.6 : 1));   // popping a drainer restores extra
    spawnBurst(c.x + c.w/2, c.y + c.h/2, ['#ff5f8d','#ffd23f','#3ddc84','#4cc9f0','#ff9d3c']);
  } else {
    c.hitFlash = 22; addScore(25); c.charge = 0; c.windup = 0;   // interrupt its attack
    if (dir) { c.vx = dir > 0 ? 0.7 : -0.7; c.x += dir*3; }
    spawnBurst(c.x + c.w/2, c.y + c.h/2, ['#fff','#ffd23f']);
  }
}

// Grey Nests: spiky drain-mounds. Three hits to crack open; each destroyed
// nest gives a big tide burst. While alive they drain colour and hatch crabs.
function damageNest(n) {
  if (n.flash > 0) return;
  n.hp--; n.flash = 20;
  if (n.hp <= 0) {
    n.dead = true; addScore(250); gainTide(0.12);
    spawnBurst(n.x + n.w/2, n.y + n.h/2, ['#ff5f8d','#ffd23f','#3ddc84','#4cc9f0','#ff9d3c','#fff'], 26);
  } else {
    spawnBurst(n.x + n.w/2, n.y + 2, ['#cfcfcf','#9a9a9a']);
  }
}

/* ---------------- Input ---------------- */
const keys = { left: false, right: false, jump: false, jumpQueued: false, attack: false, attackQueued: false };
function bindBtn(id, key) {
  const el = document.getElementById(id);
  const on = (e) => { e.preventDefault(); keys[key] = true; if (key==='jump') keys.jumpQueued = true; if (key==='attack') keys.attackQueued = true; el.classList.add('press'); };
  const off = (e) => { e.preventDefault(); keys[key] = false; el.classList.remove('press'); };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on);
  window.addEventListener('mouseup', off);
}
bindBtn('left','left'); bindBtn('right','right'); bindBtn('jump','jump'); bindBtn('claw','attack');

const isAtk = (k) => k==='x' || k==='k' || k==='j' || k==='Shift';
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') { keys.jump = true; keys.jumpQueued = true; }
  if (isAtk(e.key)) { keys.attack = true; keys.attackQueued = true; }
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') keys.jump = false;
  if (isAtk(e.key)) keys.attack = false;
});

/* ---------------- Physics helpers ---------------- */
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
// Move an entity by (vx,vy) resolving against solids axis-by-axis.
function moveAndCollide(e) {
  e.x += e.vx;
  for (const s of solids) {
    if (aabb(e, s)) {
      if (e.vx > 0) e.x = s.x - e.w;
      else if (e.vx < 0) e.x = s.x + s.w;
      e.vx = 0;
    }
  }
  e.onGround = false;
  e.y += e.vy;
  for (const s of solids) {
    if (aabb(e, s)) {
      if (e.vy > 0) { e.y = s.y - e.h; e.onGround = true; }
      else if (e.vy < 0) e.y = s.y + s.h;
      e.vy = 0;
    }
  }
}

function spawnBurst(x, y, colors, n=14) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*6.28, sp = 1+Math.random()*3.5;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1.5,
      life: 30+Math.random()*20, col: colors[(Math.random()*colors.length)|0], r: 2+Math.random()*2 });
  }
}

/* ---------------- Update ---------------- */
function update() {
  const p = player;

  timeT += 1/60;                 // level timer (display only)
  if (bannerT > 0) bannerT--;    // level-name banner fade

  // Horizontal input
  if (keys.left)  { p.vx -= MOVE; p.face = -1; }
  if (keys.right) { p.vx += MOVE; p.face = 1; }
  if (!keys.left && !keys.right) p.vx *= FRICT;
  const maxvx = MAXVX + upg.speed * 0.7 + (rush > 0 ? 0.6 : 0);   // Speed Boots + Rainbow Rush
  p.vx = Math.max(-maxvx, Math.min(maxvx, p.vx));
  if (Math.abs(p.vx) > 0.3) p.walk += 0.25;

  // Jump (with tiny queue so taps feel responsive)
  if ((keys.jump || keys.jumpQueued) && p.onGround) { p.vy = -(JUMP_V + upg.jump * 1.2 + (rush > 0 ? 1.0 : 0)); p.onGround = false; }  // Jump Boost + Rush
  keys.jumpQueued = false;

  // Claw attack — a quick swipe in front of Pinny, with a short cooldown
  if (p.atkCd > 0) p.atkCd--;
  if (p.atk > 0) p.atk--;
  if ((keys.attack || keys.attackQueued) && p.atk <= 0 && p.atkCd <= 0) { p.atk = 14; p.atkCd = 26 - upg.claw * 5 - (rush > 0 ? 4 : 0); }  // Claw Power + Rush
  keys.attackQueued = false;

  p.vy += GRAV;
  if (p.vy > 12) p.vy = 12;
  moveAndCollide(p);

  // keep player inside the level horizontally
  if (p.x < 0) { p.x = 0; p.vx = 0; }
  if (p.x + p.w > level.w) { p.x = level.w - p.w; p.vx = 0; }

  if (p.onGround && !p.wasGround) p.squash = 8;   // landing squash
  if (p.squash > 0) p.squash--;
  p.wasGround = p.onGround;

  if (p.hurt > 0) p.hurt--;
  if (--p.blink < 0) p.blink = 120 + Math.random()*120;

  // Active claw hitbox — a small reach in front of Pinny during the swing
  let atkBox = null;
  if (p.atk > 6) {
    // Claw Power upgrade + colour empowers the claw (weak in grey, strongest in rush)
    const reach = 18 + upg.claw * 8 + (tState() >= 2 ? 3 : 0) + (rush > 0 ? 5 : 0);
    atkBox = { x: p.face > 0 ? p.x + p.w - 2 : p.x - reach + 2, y: p.y + 2, w: reach, h: p.h - 2 };
  }

  // Enemies — each crab type fights back in its own way
  for (const c of enemies) {
    if (c.dead) continue;
    c.wig += 0.2;
    if (c.hitFlash > 0) c.hitFlash--;
    if (c.shootCd > 0) c.shootCd--;
    if (c.lungeCd > 0) c.lungeCd--;
    if (c.windup > 0) c.windup--;
    if (c.charge > 0) c.charge--;

    const dxp = (p.x + p.w/2) - (c.x + c.w/2);
    const sameLevel = Math.abs((p.y + p.h) - (c.y + c.h)) < 40;

    // --- attacks ---
    if (c.kind === 'red' || c.kind === 'flower' || c.kind === 'mushroom') {
      // shooters: lob a projectile at Pinny when he's near and roughly level
      if (c.onG && c.shootCd <= 0 && Math.abs(dxp) < 155 && sameLevel) {
        fireProjectile(c, dxp > 0 ? 1 : -1);
        c.shootCd = 150 + Math.random()*110;
      }
    } else if (c.kind !== 'sucker') {
      // grey & crate: telegraphed charge/lunge toward Pinny
      if (c.onG && c.charge <= 0 && c.windup <= 0 && c.lungeCd <= 0 && Math.abs(dxp) < 120 && sameLevel) {
        c.windup = 26; c.dir = dxp > 0 ? 1 : -1;                 // wind up (shake)
      }
      if (c.windup === 1) { c.charge = 30; c.lungeCd = 150; }    // then dash
    }
    // (Paint-Suckers don't attack — their threat is the constant colour drain.)

    // --- horizontal movement (a colourful world calms the crabs slightly) ---
    const calm = tState() >= 2 ? 0.9 : 1;
    let vx;
    if (c.charge > 0) vx = c.dir * (c.kind === 'crate' ? 2.6 : 3.0) * calm;
    else if (c.windup > 0) vx = 0;                               // freeze during wind-up
    else vx = (c.vx > 0 ? 1 : -1) * (c.kind === 'sucker' ? 0.4 : 0.7) * calm;
    c.x += vx;
    let hitWall = false;
    for (const s of solids) { if (aabb(c, s)) { if (vx>0) c.x=s.x-c.w; else c.x=s.x+s.w; hitWall = true; } }
    if (c.charge > 0) { if (hitWall) c.charge = 0; }
    else if (hitWall || c.x < c.homeMin || c.x > c.homeMax) c.vx *= -1;

    // --- gravity ---
    c.vy = (c.vy || 0) + GRAV; if (c.vy > 12) c.vy = 12;
    c.onG = false; c.y += c.vy;
    for (const s of solids) { if (aabb(c, s)) { if (c.vy>0){c.y=s.y-c.h;c.onG=true;} c.vy=0; } }

    // Claw hit — swipe the crab (armoured crate takes 2)
    if (atkBox && c.hitFlash <= 0 && aabb(c, atkBox)) { damageCrab(c, p.face); if (c.dead) continue; }

    // Player collision
    if (c.hitFlash <= 0 && aabb(p, c)) {
      const stomped = p.vy > 1.2 && (p.y + p.h) - c.y < 12;
      if (stomped) { p.vy = -6.5; damageCrab(c, 0); }            // bounce + hurt crab
      else if (p.hurt <= 0) {
        lives--; p.hurt = 90; p.vx = (p.x < c.x ? -1 : 1) * 4; p.vy = -5;
        gainTide(-0.04);                                   // getting hit lets grey creep back
        spawnBurst(p.x+p.w/2, p.y+p.h/2, ['#bbbbbb','#dddddd']);
        if (lives <= 0) return endGame(false);
      }
    }
  }

  // Enemy projectiles
  for (const pr of projectiles) {
    pr.bob += 0.2; pr.vy += pr.g; pr.x += pr.vx; pr.y += pr.vy; pr.life--;
    for (const s of solids) { if (pr.x>s.x && pr.x<s.x+s.w && pr.y>s.y && pr.y<s.y+s.h) { pr.life = 0; break; } }
    const box = { x: pr.x-pr.r, y: pr.y-pr.r, w: pr.r*2, h: pr.r*2 };
    if (atkBox && pr.life > 0 && aabb(box, atkBox)) { pr.life = 0; spawnBurst(pr.x, pr.y, ['#fff','#ffd23f']); }  // clawed away
    if (pr.life > 0 && p.hurt <= 0 && aabb(p, box)) {
      pr.life = 0; lives--; p.hurt = 90; p.vx = (pr.vx>0?1:-1)*3.5; p.vy = -4.5;
      gainTide(-0.04);
      spawnBurst(p.x+p.w/2, p.y+p.h/2, ['#bbbbbb','#dddddd']);
      if (lives <= 0) return endGame(false);
    }
  }
  projectiles = projectiles.filter(pr => pr.life > 0 && pr.y < level.h + 60);

  // ---- Grey Nests: take hits, hatch crabs, drain colour while alive ----
  for (const n of nests) {
    if (n.dead) continue;
    n.pulse += 0.06;
    if (n.flash > 0) n.flash--;
    if (atkBox && aabb(n, atkBox)) damageNest(n);                 // claw the nest
    if (aabb(p, n) && p.vy > 1.2 && (p.y + p.h) - n.y < 12) {     // or stomp it
      p.vy = -6.5; damageNest(n);
    }
    if (--n.spawnT <= 0) {                                        // hatch a grey crab
      n.spawnT = 480;
      if (!n.hatch || n.hatch.dead) {
        n.hatch = makeCrab(n.x - 2, n.y - 10, 'grey');
        enemies.push(n.hatch);
        spawnBurst(n.x + n.w/2, n.y, ['#bbb','#888']);
      }
    }
  }

  // ---- Colour Tide: drain pressure vs stabilisation ----
  if (!boss) {
    const suckers = enemies.filter(c => !c.dead && c.kind === 'sucker').length;
    const liveNests = nests.filter(n => !n.dead).length;
    if (!stabilised) {
      if (graceT > 0) graceT--;
      else {
        const drainMul = 1 - upg.colour * 0.3;                    // Colour Boost slows the drain
        const drain = (suckers * 0.00045 + liveNests * 0.0003) * drainMul;
        if (drain > 0) tide = Math.max(0.05, tide - drain);       // never below the floor
      }
      // all crabs and nests cleared -> the colour stabilises, tide floods in
      if (liveNests === 0 && enemies.every(c => c.dead)) {
        stabilised = true;
        if (!rushUsed) { rushUsed = true; rush = 600; }           // RAINBOW RUSH!
      }
    }
    if (stabilised) tide = Math.min(1, tide + 0.01);
  }

  // ---- Rainbow Rush: confetti, sparkle trail, double points ----
  if (rush > 0) {
    rush--;
    if (rush % 9 === 0)
      spawnBurst(p.x + p.w/2 + (Math.random()-0.5)*90, p.y - 20 - Math.random()*40,
                 ['#ff5f8d','#ffd23f','#3ddc84','#4cc9f0','#b06bff'], 4);
    if (rush % 3 === 0)
      particles.push({ x: p.x + p.w/2 - p.face*8, y: p.y + p.h - 2,
                       vx: -p.face*0.5, vy: -0.3, life: 26,
                       col: ['#ff5f8d','#ffd23f','#3ddc84','#4cc9f0','#b06bff'][(Math.random()*5)|0], r: 2.5 });
  }

  // Hidden fruit materialises once the world turns COLOURFUL
  if (tState() >= 2) for (const f of fruits) {
    if (f.hidden && !f.got) { f.hidden = false; spawnBurst(f.x, f.y, ['#fff','#ffd23f','#ff8fa3'], 8); }
  }

  // Boss fight
  if (boss && !boss.dead) {
    const bo = boss;
    bo.wig += 0.15;
    if (bo.hurt > 0) bo.hurt--;
    const spd = 1.0 + (bo.maxhp - bo.hp) * 0.28;   // angrier (lower HP) = faster
    bo.x += (bo.vx > 0 ? 1 : -1) * spd;
    let hitw = false;
    for (const s of solids) { if (aabb(bo, s)) { if (bo.vx>0) bo.x=s.x-bo.w; else bo.x=s.x+bo.w; hitw = true; } }
    if (bo.x <= 0) { bo.x = 0; hitw = true; }
    if (bo.x + bo.w >= level.w) { bo.x = level.w - bo.w; hitw = true; }
    if (hitw) bo.vx *= -1;
    bo.vy += GRAV; if (bo.vy > 12) bo.vy = 12; bo.y += bo.vy;
    for (const s of solids) { if (aabb(bo, s)) { if (bo.vy > 0) bo.y = s.y - bo.h; bo.vy = 0; } }

    // Boss attack: fire a fan of spores at Pinny (faster as he's worn down)
    if (bo.shootCd > 0) bo.shootCd--;
    if (bo.shootCd <= 0) {
      const dir = (p.x + p.w/2) < (bo.x + bo.w/2) ? -1 : 1;
      const cx = bo.x + bo.w/2, cy = bo.y + 8;
      for (const dv of [-1.2, -0.4, 0.4]) projectiles.push({ x:cx+dir*10, y:cy, vx:dir*1.6, vy:dv, g:0.04, kind:'spore', r:5, life:200, bob:Math.random()*6.28 });
      bo.shootCd = 150 - (bo.maxhp - bo.hp) * 12;   // 150 → ~90 frames as HP drops
    }

    if (atkBox && bo.hurt <= 0 && aabb(bo, atkBox)) hitBoss(p.face);   // claw hit
    if (!boss.dead && aabb(p, bo)) {
      const stomped = p.vy > 1.2 && (p.y + p.h) - bo.y < 16;
      if (stomped && bo.hurt <= 0) { p.vy = -8.5; hitBoss(0); }
      else if (!stomped && bo.hurt <= 0 && p.hurt <= 0) {
        lives--; p.hurt = 90; p.vx = (p.x < bo.x ? -1 : 1) * 5; p.vy = -5;
        spawnBurst(p.x+p.w/2, p.y+p.h/2, ['#bbbbbb','#dddddd']);
        if (lives <= 0) return endGame(false);
      }
    }
    if (!running) return;   // boss defeat may have ended the game
  }

  // Fruit pickups (hidden fruit is intangible until the world is COLOURFUL)
  for (const f of fruits) {
    if (f.got || f.hidden) continue;
    f.bob += 0.1;
    if (aabb(p, {x:f.x-f.r, y:f.y-f.r, w:f.r*2, h:f.r*2})) {
      f.got = true; melons++; addScore(25); gainTide(0.02);
      spawnBurst(f.x, f.y, ['#ff5a5f','#2f9e44','#ff8fa3','#fff']);
    }
  }

  // Heart pickups — grant an extra life (up to MAX_LIVES)
  for (const h of hearts) {
    if (h.got) continue;
    h.bob += 0.1;
    if (aabb(p, {x:h.x-9, y:h.y-9, w:18, h:18})) {
      h.got = true; addScore(50);
      if (lives < MAX_LIVES) lives++;
      spawnBurst(h.x, h.y, ['#ff3b5c','#ff8fa3','#fff']);
    }
  }

  // Particles
  for (const pt of particles) { pt.vy += 0.18; pt.x += pt.vx; pt.y += pt.vy; pt.life--; }
  particles = particles.filter(pt => pt.life > 0);

  // Fell in a pit
  if (p.y > level.h + 40) {
    lives--;
    if (lives <= 0) return endGame(false);
    respawn();
  }

  // Reached the flag → win (only when the world's colour is mostly back)
  if (flag && aabb(p, flag)) {
    if (greyLeft === 0) return finishLevel();
    // If crabs remain, still let them pass to keep it kid-easy
    return finishLevel();
  }

  // Camera follows player. The playable view stops above the control deck
  // (ctrlPad); when the view is taller than the level, anchor the level to
  // the bottom of that playable area so the sky fills the space above and
  // the ground never hides under the touch buttons.
  const evh = VH - ctrlPad;
  cam.x = Math.max(0, Math.min(level.w - VW, p.x + p.w/2 - VW/2));
  if (level.h <= evh) cam.y = level.h - evh;
  else cam.y = Math.max(0, Math.min(level.h - evh, p.y + p.h/2 - evh/2));
}

function respawn() {
  const map = LEVELS[levelIndex];
  for (let r=0;r<map.length;r++) for (let c=0;c<map[r].length;c++)
    if (map[r][c]==='P') { player.x = c*TILE; player.y = r*TILE; }
  player.vx = 0; player.vy = 0; player.hurt = 60;
}

// Land a hit on the boss (stomp or claw). dir = knockback direction (0 = none).
function hitBoss(dir) {
  boss.hp--; boss.hurt = 40; addScore(300);
  tide = boss.hp <= 0 ? 1 : (boss.maxhp - boss.hp) / boss.maxhp;   // boss stage: tide tracks his HP
  if (dir) boss.vx = dir > 0 ? Math.abs(boss.vx) : -Math.abs(boss.vx);
  spawnBurst(boss.x + boss.w/2, boss.y + boss.h/2, ['#ff5f8d','#ffd23f','#3ddc84','#4cc9f0','#ff9d3c'], 22);
  if (boss.hp <= 0) {
    boss.dead = true;
    spawnBurst(boss.x + boss.w/2, boss.y + boss.h/2, ['#ff5f8d','#ffd23f','#3ddc84','#4cc9f0','#ff9d3c','#fff'], 44);
    finishLevel();   // boss is the final stage → triggers the win screen
  }
}

// Colour Tide → world saturation, applied every frame with easing so the
// colour visibly floods in (and seeps out) rather than snapping.
function applyTide() {
  tideVis += (tide - tideVis) * 0.04;
  if (rush > 0) {
    const pulse = 1.1 + Math.sin(timeT*6) * 0.08;
    worldCanvas.style.filter = `saturate(${pulse}) brightness(1.06)`;
  } else {
    worldCanvas.style.filter = `saturate(${tideVis}) brightness(${0.88 + tideVis*0.12})`;
  }
}

/* ---------------- Rendering ---------------- */
function clamp01(v){return v<0?0:v>1?1:v;}

let tideState_ = 0;   // per-frame snapshot for the renderers (tiles react to the tide)

function draw() {
  applyTide();                                     // Colour Tide -> world saturation (eased)
  tideState_ = tState();

  // ---------- WORLD LAYER (starts greyscale; colour returns via CSS filter) ----------
  ctx = worldCtx;
  const bg = bgArt[levelIndex];
  if (bg) {                                        // painted Higgsfield backdrop, gentle parallax
    ctx.imageSmoothingEnabled = false;
    const bw = Math.ceil(bg.width * (VH / bg.height));
    let bx = -((cam.x * 0.08) % bw); if (bx > 0) bx -= bw;
    for (; bx < VW; bx += bw) ctx.drawImage(bg, bx, 0, bw, VH);
  } else {
    drawSky();                                     // gradient, stars, sun/moon, clouds
    drawFar();                                     // far parallax silhouettes per world
  }
  drawHills(cam.x*0.3, theme.hills[0], VH-70);
  drawHills(cam.x*0.5 + 120, theme.hills[1], VH-45);

  ctx.save();
  ctx.translate(-Math.round(cam.x), -Math.round(cam.y));
  drawAmbient();                                   // drifting leaves / bubbles / spores / ash
  for (const s of solids) drawBlock(s);            // ground / blocks (themed, neighbour-aware)
  for (const n of nests) if (!n.dead) drawNest(n); // grey nests (drain pressure)
  for (const c of enemies) if (!c.dead) drawCrab(c); // hybrid crabs (grey until rescued)
  if (boss && !boss.dead) drawBoss(boss);
  ctx.restore();

  // ---------- FOREGROUND LAYER (always full colour) ----------
  // Pinny, the watermelons, the flag and the rescue bursts stay vivid so
  // they're always visible even while the world is grey.
  ctx = fgCtx;
  ctx.clearRect(0,0,VW,VH);
  ctx.save();
  ctx.translate(-Math.round(cam.x), -Math.round(cam.y));
  if (flag) drawFlag(flag);
  for (const f of fruits) if (!f.got && !f.hidden) drawFruit(f);
  for (const h of hearts) if (!h.got) drawHeartPickup(h);
  drawPinny(player);
  for (const pr of projectiles) drawProjectile(pr);
  for (const pt of particles) {
    ctx.globalAlpha = clamp01(pt.life/30);
    ctx.fillStyle = pt.col;
    ctx.fillRect(pt.x-pt.r/2, pt.y-pt.r/2, pt.r, pt.r);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // control deck (portrait): a solid bezel under the play area so the world
  // never renders behind the touch buttons
  if (ctrlPad > 0) {
    ctx.fillStyle = '#171024';
    ctx.fillRect(0, VH - ctrlPad, VW, ctrlPad);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(0, VH - ctrlPad, VW, 2);
  }

  // soft vignette for depth (Hollow Knight-style framing), under the HUD
  const vg = ctx.createRadialGradient(VW/2, VH*0.45, VH*0.5, VW/2, VH*0.55, VH*1.1);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(8,4,18,0.42)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,VW,VH);

  drawHUD();
}

// Deterministic per-tile random (stable across frames, so decorations don't flicker).
function hash2(a, b) {
  let h = (a*374761393 + b*668265263) | 0;
  h = ((h ^ (h>>>13)) * 1274126177) | 0;
  return ((h ^ (h>>>16)) >>> 0) / 4294967296;
}
function clampv(v, a, b) { return v < a ? a : v > b ? b : v; }

function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,VH);
  g.addColorStop(0, theme.sky[0]); g.addColorStop(0.55, theme.sky[1]); g.addColorStop(1, theme.sky[2]);
  ctx.fillStyle = g; ctx.fillRect(0,0,VW,VH);

  if (theme.stars) {                               // twinkling night sky
    for (let i=0;i<44;i++) {
      const x = hash2(i,1)*VW, y = hash2(i,2)*130;
      ctx.globalAlpha = 0.25 + 0.75*Math.abs(Math.sin(timeT*1.5 + i));
      ctx.fillStyle = '#fff';
      const s = i%7===0 ? 2 : 1.2;
      ctx.fillRect(x, y, s, s);
    }
    ctx.globalAlpha = 1;
  }

  // sun / moon with a soft glow halo
  const sx = VW*0.78 - cam.x*0.04, sy = theme.sunY || 42;
  ctx.fillStyle = theme.sun;
  ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(sx, sy, 24, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;   ctx.beginPath(); ctx.arc(sx, sy, 13, 0, 6.28); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(sx-4, sy-4, 4, 0, 6.28); ctx.fill();

  drawClouds(0.06, 0.5, 30);
  drawClouds(0.12, 0.8, 58);
}

// Banded pixel clouds, drifting slowly with time + camera parallax.
function drawClouds(par, alpha, y0) {
  ctx.fillStyle = theme.cloud;
  ctx.globalAlpha = 0.45*alpha;
  for (let i=0;i<5;i++) {
    const w = 40 + hash2(i,7)*44;
    let x = (hash2(i,3)*(VW+160) - cam.x*par + timeT*(3+i)) % (VW+160) - 80;
    if (x < -80) x += VW+160;
    const y = y0 + hash2(i,11)*26;
    roundRect(x, y, w, 7, 3.5); ctx.fill();
    roundRect(x+6, y-5, w*0.62, 6, 3); ctx.fill();
    roundRect(x+10, y+5, w*0.72, 5, 2.5); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Far parallax layer — each world gets its signature silhouette skyline.
function drawFar() {
  const off = cam.x*0.16, base = VH-92, span = VW+160;
  ctx.fillStyle = theme.far;
  silhouette(off*0.8, base+16, 42);

  const wrap = (x) => (((x % span) + span) % span) - 80;
  switch (theme.deco) {
    case 'jungle':                                 // waterfalls pouring off far cliffs
      for (let i=0;i<3;i++) {
        const x = wrap(i*200 + 70 - off), top = base - 26 + hash2(i,5)*18;
        ctx.fillStyle = 'rgba(214,242,255,0.4)'; ctx.fillRect(x, top, 9, VH-top);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        for (let yy = top + (timeT*46)%16; yy < VH; yy += 16) ctx.fillRect(x+2.5, yy, 4, 7);
        ctx.fillStyle = theme.far;
      }
      break;
    case 'palm':                                   // leaning palm silhouettes
      for (let i=0;i<4;i++) palmSil(wrap(i*160 + 40 - off), base+22, 30 + hash2(i,9)*14);
      break;
    case 'gear':                                   // great gears slowly turning
      gearSil(wrap(150 - off), base-10, 26, timeT*0.25);
      gearSil(wrap(430 - off), base+6, 18, -timeT*0.35);
      break;
    case 'crate':                                  // stacked crate mesas
      for (let i=0;i<3;i++) {
        const x = wrap(i*210 + 30 - off), s = 18 + hash2(i,4)*8;
        for (let r=0;r<3;r++) for (let c2=0;c2<3-r;c2++)
          ctx.fillRect(x + c2*(s+2) + r*(s/2), base+18 - (r+1)*(s+2), s, s);
      }
      break;
    case 'mush':                                   // giant mushrooms with glow spots
      for (let i=0;i<3;i++) {
        const x = wrap(i*190 + 80 - off), h = 34 + hash2(i,6)*20;
        ctx.fillRect(x-3, base+20-h, 7, h);
        ctx.beginPath(); ctx.arc(x, base+22-h, 20, Math.PI, 0); ctx.closePath(); ctx.fill();
        ctx.fillStyle = 'rgba(208,164,255,0.5)';
        ctx.fillRect(x-8, base+16-h, 3, 3); ctx.fillRect(x+6, base+12-h, 2.5, 2.5);
        ctx.fillStyle = theme.far;
      }
      break;
    case 'ruin': case 'keep':                      // broken towers, battlements, banners
      for (let i=0;i<4;i++) {
        const x = wrap(i*170 + 30 - off), h = 40 + hash2(i,8)*26, w = 22;
        ctx.fillRect(x, base+20-h, w, h);
        for (let t=0;t<3;t++) ctx.fillRect(x + t*8, base+14-h, 5, 6);
        if (theme.deco==='keep') {
          ctx.beginPath(); ctx.moveTo(x-4, base+28-h); ctx.lineTo(x-13, base-h-4); ctx.lineTo(x+3, base+20-h); ctx.closePath(); ctx.fill();
        }
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath(); ctx.moveTo(x+w/2-3, base+22-h); ctx.lineTo(x+w/2+3, base+22-h); ctx.lineTo(x+w/2, base+34-h); ctx.closePath(); ctx.fill();
        ctx.fillStyle = theme.far;
      }
      break;
  }
}

function palmSil(x, baseY, h) {
  ctx.fillRect(x, baseY-h, 3, h);
  for (let a=0;a<5;a++) {
    ctx.save(); ctx.translate(x+1.5, baseY-h);
    ctx.rotate(-Math.PI/2 + (a-2)*0.5);
    roundRect(0, -2, 15, 4, 2); ctx.fill();
    ctx.restore();
  }
}

function gearSil(x, y, rad, rot) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  for (let i=0;i<8;i++) { ctx.rotate(Math.PI/4); ctx.fillRect(-3, -rad-5, 6, 7); }
  ctx.beginPath(); ctx.arc(0, 0, rad, 0, 6.28); ctx.fill();
  ctx.restore();
}

function silhouette(off, baseY, amp) {
  ctx.beginPath(); ctx.moveTo(0, VH);
  for (let x=0; x<=VW; x+=6) {
    const wx = x + off;
    ctx.lineTo(x, baseY - (Math.sin(wx*0.012)*0.5+0.5)*amp - Math.sin(wx*0.045)*7);
  }
  ctx.lineTo(VW, VH); ctx.closePath(); ctx.fill();
}

// Mid-ground rolling hills with a dithered pixel crest.
function drawHills(offset, col, baseY) {
  ctx.fillStyle = col;
  const crest = [];
  ctx.beginPath(); ctx.moveTo(0, VH);
  for (let x=0; x<=VW; x+=4) {
    const wx = x + offset;
    const y = baseY - Math.sin(wx*0.02)*22 - 10;
    crest.push([x, y]); ctx.lineTo(x, y);
  }
  ctx.lineTo(VW, VH); ctx.closePath(); ctx.fill();
  for (const [x,y] of crest) if (hash2(x|0, baseY|0) > 0.6) ctx.fillRect(x, y-2, 2, 2);
}

// Ambient drifting motes (leaves / bubbles / spores / ash). They live on the
// world layer so they start grey and glow to life as colour is rescued.
function drawAmbient() {
  const a = theme.amb; if (!a || !ambient) return;
  for (const m of ambient) {
    m.ph += 0.02;
    m.x += a.dx + Math.sin(m.ph)*0.15;
    m.y += a.dy * (0.6 + m.sp);
    if (m.y > level.h + 20) { m.y = -10; m.x = Math.random()*level.w; }
    if (m.y < -20) { m.y = level.h + 10; m.x = Math.random()*level.w; }
    if (m.x > level.w + 20) m.x = -10; else if (m.x < -20) m.x = level.w;
    const tw = 0.35 + 0.65*Math.abs(Math.sin(m.ph*1.3));
    ctx.fillStyle = a.col;
    if (a.glow) { ctx.globalAlpha = 0.2*tw; ctx.beginPath(); ctx.arc(m.x, m.y, 4, 0, 6.28); ctx.fill(); }
    ctx.globalAlpha = 0.6*tw;
    ctx.fillRect(m.x-1, m.y-1, 2.5, 2.5);
  }
  ctx.globalAlpha = 1;
}

const FLOWER_COLS = ['#ff6f9d','#ffd23f','#b06bff','#ff8a5f'];

// Neighbour-aware tile renderer: tiles know which sides are exposed, so caps,
// vines, shading and outlines land only on real edges (16-bit tileset look).
function drawBlock(s) {
  const c = s.x / TILE, r = s.y / TILE;
  const up = solidSet.has(c+','+(r-1)), dn = solidSet.has(c+','+(r+1));
  const lf = solidSet.has((c-1)+','+r),  rt = solidSet.has((c+1)+','+r);
  const h1 = hash2(c, r), h2 = hash2(r, c);

  if (theme.block === 'crate') {                   // wooden crates (Box Mountains)
    ctx.fillStyle = '#a9713c'; ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.fillStyle = '#c98d4f'; ctx.fillRect(s.x, s.y, s.w, 3);            // lit top edge
    ctx.fillStyle = '#8a5a2c'; ctx.fillRect(s.x, s.y+s.h-3, s.w, 3);
    ctx.strokeStyle = '#6e461f'; ctx.lineWidth = 1;
    ctx.strokeRect(s.x+1.5, s.y+1.5, s.w-3, s.h-3);
    ctx.beginPath(); ctx.moveTo(s.x+2, s.y+2); ctx.lineTo(s.x+s.w-2, s.y+s.h-2);
                     ctx.moveTo(s.x+s.w-2, s.y+2); ctx.lineTo(s.x+2, s.y+s.h-2); ctx.stroke();
    ctx.fillStyle = '#4d3016';
    for (const [dx,dy] of [[3,3],[s.w-3,3],[3,s.h-3],[s.w-3,s.h-3]]) ctx.fillRect(s.x+dx-1, s.y+dy-1, 2, 2);
    if (!up && h1 > 0.6) { ctx.fillStyle = '#8fae4a'; ctx.fillRect(s.x+4+h2*10, s.y-3, 2, 3); }
  } else if (theme.block === 'stone') {            // mossy brick stone (Coral/Marsh/Wasteland/Keep)
    ctx.fillStyle = '#868c96'; ctx.fillRect(s.x, s.y, s.w, s.h);
    const offx = (r % 2) * 12;                     // running-bond brick joints
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(s.x, s.y+11, s.w, 1.5);
    ctx.fillRect(s.x + ((offx+6) % 24), s.y, 1.5, 12);
    ctx.fillRect(s.x + ((offx+18) % 24), s.y+12, 1.5, 12);
    ctx.fillStyle = 'rgba(255,255,255,0.10)'; ctx.fillRect(s.x, s.y, s.w, 2);
    if (h1 > 0.55) { ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(s.x+4+h2*12, s.y+5+h1*10, 3, 2); }
    if (!up) {                                     // moss cap with drips + rim light
      ctx.fillStyle = theme.moss; ctx.fillRect(s.x, s.y, s.w, 5);
      ctx.fillRect(s.x+3+h1*6, s.y+5, 2, 3+h2*4);
      ctx.fillRect(s.x+14+h2*5, s.y+5, 2, 2+h1*5);
      ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.fillRect(s.x, s.y, s.w, 1.2);
      // life returns with the tide: flowers from FADED, theme props grow too
      if (tideState_ >= 1 && h1 > 0.7) { ctx.fillStyle = FLOWER_COLS[(h2*4)|0]; ctx.fillRect(s.x+5+h2*12, s.y-3, 2.5, 2.5); }
      if (tideState_ >= 1 && theme.deco === 'gear' && h2 > 0.72) {   // coral fans (Coral Gear Coast)
        const fx = s.x + 4 + h1*14;
        ctx.fillStyle = ['#ff7a9d','#ff9d5f','#c86bff'][(h1*3)|0];
        ctx.beginPath(); ctx.arc(fx, s.y-1, 4, Math.PI, 0); ctx.closePath(); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(fx-2.5, s.y-3.5, 1, 3); ctx.fillRect(fx+0.5, s.y-4.5, 1, 4); ctx.fillRect(fx+2, s.y-3, 1, 2.5);
      }
      if (tideState_ >= 1 && theme.deco === 'mush' && h2 > 0.75) {   // tiny mushrooms (Mushroom Marsh)
        const mx = s.x + 5 + h1*12;
        ctx.fillStyle = '#e8e0d0'; ctx.fillRect(mx, s.y-4, 2, 4);
        ctx.fillStyle = '#d63a5f'; ctx.beginPath(); ctx.arc(mx+1, s.y-4, 3.2, Math.PI, 0); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#ffd9e2'; ctx.fillRect(mx-0.5, s.y-6, 1.2, 1.2);
      }
    }
    if (!up && !lf && h2 > 0.5) { ctx.fillStyle = theme.moss; ctx.fillRect(s.x, s.y+5, 2, 6+h1*8); }
    if (!up && !rt && h1 > 0.5) { ctx.fillStyle = theme.moss; ctx.fillRect(s.x+s.w-2, s.y+5, 2, 6+h2*8); }
  } else {                                         // grassy dirt (Emerald Falls / Palm Cove)
    const grassTop = 6;
    ctx.fillStyle = '#b5763d'; ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.fillStyle = 'rgba(0,0,0,0.16)';            // buried pebbles
    if (h1 > 0.35) ctx.fillRect(s.x+3+h2*14, s.y+10+h1*9, 3, 2);
    if (h2 > 0.55) ctx.fillRect(s.x+5+h1*12, s.y+15+h2*5, 2, 2);
    ctx.fillStyle = '#9c5f2c';
    if (!lf) ctx.fillRect(s.x, s.y+grassTop, 3, s.h-grassTop);
    if (!rt) ctx.fillRect(s.x+s.w-3, s.y+grassTop, 3, s.h-grassTop);
    if (!up) {
      ctx.fillStyle = '#3ddc84'; ctx.fillRect(s.x, s.y, s.w, grassTop);
      ctx.fillStyle = '#2fb96a'; ctx.fillRect(s.x, s.y+grassTop, s.w, 2);
      ctx.fillStyle = '#7ff2b2'; ctx.fillRect(s.x, s.y, s.w, 1.5);        // sun-lit rim
      ctx.fillStyle = '#4dee97';                                          // grass tufts
      ctx.fillRect(s.x+2+h1*6, s.y-2, 2, 3);
      ctx.fillRect(s.x+11+h2*4, s.y-3, 2, 4);
      ctx.fillRect(s.x+18+h1*3, s.y-2, 2, 3);
      if (tideState_ >= 1 && h1 > 0.62) {          // wildflowers bloom from FADED onward
        const fx = s.x + 4 + h2*14;
        ctx.fillStyle = '#2fb96a'; ctx.fillRect(fx+1, s.y-4, 1.5, 4);
        ctx.fillStyle = FLOWER_COLS[(h2*4)|0]; ctx.fillRect(fx, s.y-6, 3.5, 3.5);
        ctx.fillStyle = '#fff2b0'; ctx.fillRect(fx+1.2, s.y-4.8, 1.2, 1.2);
        if (tideState_ >= 2 && h2 > 0.5) {          // butterflies at COLOURFUL
          const bx = fx + Math.sin(timeT*2 + h1*9)*6, by = s.y - 10 + Math.cos(timeT*2.6 + h2*7)*3;
          ctx.fillStyle = FLOWER_COLS[(h1*4)|0];
          ctx.fillRect(bx-1.5, by, 1.5, 1.5); ctx.fillRect(bx+0.5, by, 1.5, 1.5);
        }
      }
      if (!lf && h2 > 0.5) {                                              // hanging vines
        ctx.fillStyle = '#2fb96a'; ctx.fillRect(s.x, s.y+grassTop, 2, 7+h1*9);
        ctx.fillRect(s.x-1, s.y+grassTop+5+h1*6, 3, 2);
      }
      if (!rt && h1 > 0.5) {
        ctx.fillStyle = '#2fb96a'; ctx.fillRect(s.x+s.w-2, s.y+grassTop, 2, 7+h2*9);
        ctx.fillRect(s.x+s.w-3, s.y+grassTop+4+h2*6, 3, 2);
      }
    }
  }

  // dark outline on every exposed edge — reads as hand-drawn tile borders
  ctx.fillStyle = 'rgba(20,12,8,0.35)';
  if (!up) ctx.fillRect(s.x, s.y, s.w, 1.5);
  if (!dn) ctx.fillRect(s.x, s.y+s.h-1.5, s.w, 1.5);
  if (!lf) ctx.fillRect(s.x, s.y, 1.5, s.h);
  if (!rt) ctx.fillRect(s.x+s.w-1.5, s.y, 1.5, s.h);
}

// Watermelon slice — the collectible ("colour is life!").
function drawFruit(f) {
  const y = f.y + Math.sin(f.bob)*3;
  ctx.save(); ctx.translate(f.x, y); ctx.rotate(Math.sin(f.bob*0.5)*0.15);
  ctx.fillStyle = 'rgba(255,120,140,0.18)';                                                               // soft glow
  ctx.beginPath(); ctx.arc(0, -1, 10, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#1d7a33'; ctx.beginPath(); ctx.arc(0,0.6,8.7,Math.PI,0); ctx.closePath(); ctx.fill();  // dark outline rind
  ctx.fillStyle = '#2f9e44'; ctx.beginPath(); ctx.arc(0,0,8,Math.PI,0); ctx.closePath(); ctx.fill();      // rind
  ctx.fillStyle = '#8ce99a'; ctx.beginPath(); ctx.arc(0,-0.5,6.6,Math.PI,0); ctx.closePath(); ctx.fill(); // light rind
  ctx.fillStyle = '#ff5a5f'; ctx.beginPath(); ctx.arc(0,-1,5.2,Math.PI,0); ctx.closePath(); ctx.fill();   // flesh
  ctx.fillStyle = '#3a2020';                                                                              // seeds
  ctx.fillRect(-3,-3.4,1,1.6); ctx.fillRect(2,-3.4,1,1.6); ctx.fillRect(-0.5,-2,1,1.6);
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(-3.5,-4.6,2,1);                                    // shine
  if (Math.sin(f.bob*2) > 0.6) { ctx.fillStyle = '#fff'; ctx.fillRect(5, -6, 1.6, 1.6); }                 // twinkle
  ctx.restore();
}

// Crab attack projectiles.
function drawProjectile(pr) {
  const wob = Math.sin(pr.bob) * 1.2;
  if (pr.kind === 'pinch') {
    ctx.fillStyle = '#ff7a3c'; ctx.beginPath(); ctx.arc(pr.x, pr.y, 4, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#ffd23f'; ctx.beginPath(); ctx.arc(pr.x, pr.y, 1.8, 0, 6.28); ctx.fill();
  } else if (pr.kind === 'pollen') {
    ctx.fillStyle = 'rgba(255,143,206,0.4)'; ctx.beginPath(); ctx.arc(pr.x, pr.y+wob, 6, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#ff8fce'; ctx.beginPath(); ctx.arc(pr.x, pr.y+wob, 4, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#ffe08a'; ctx.beginPath(); ctx.arc(pr.x, pr.y+wob, 1.6, 0, 6.28); ctx.fill();
  } else { // spore
    ctx.fillStyle = 'rgba(176,107,255,0.4)'; ctx.beginPath(); ctx.arc(pr.x, pr.y+wob, pr.r+3, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#b06bff'; ctx.beginPath(); ctx.arc(pr.x, pr.y+wob, pr.r, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#e6ccff'; ctx.beginPath(); ctx.arc(pr.x-1.2, pr.y-1.2+wob, 1.3, 0, 6.28); ctx.fill();
  }
}

// Heart pickup — a floating extra life.
function drawHeartPickup(h) {
  const y = h.y + Math.sin(h.bob) * 3;
  ctx.save();
  ctx.fillStyle = 'rgba(255,80,110,0.22)';                 // soft glow
  ctx.beginPath(); ctx.arc(h.x, y + 2, 10, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#c9203f'; heart(h.x, y - 4.5, 6.6);      // dark base for outline
  ctx.fillStyle = '#ff3b5c'; heart(h.x, y - 4, 6);          // heart body
  ctx.fillStyle = 'rgba(255,255,255,0.7)';                  // shine
  ctx.beginPath(); ctx.arc(h.x - 2, y - 1, 1.6, 0, 6.28); ctx.fill();
  ctx.restore();
}

// Goal flag with a waving striped pennant.
function drawFlag(fl) {
  const t = timeT*4;
  ctx.fillStyle = '#3a2312'; ctx.fillRect(fl.x+1, fl.y, 4, fl.h);         // pole
  ctx.fillStyle = '#6b4423'; ctx.fillRect(fl.x+2, fl.y, 1.5, fl.h);       // pole highlight
  ctx.fillStyle = '#ffd23f';                                              // gold finial
  ctx.beginPath(); ctx.arc(fl.x+3, fl.y-2, 3, 0, 6.28); ctx.fill();
  for (let i=0;i<14;i++) {                                                // waving pennant
    const wob = Math.sin(t + i*0.45)*2;
    ctx.fillStyle = i%4<2 ? '#ff5f8d' : '#ffd23f';
    ctx.fillRect(fl.x+5+i*1.6, fl.y+3 + wob + i*0.12, 2.1, Math.max(3, 12 - i*0.55));
  }
  ctx.fillStyle = '#5a4a55'; ctx.fillRect(fl.x-3, fl.y+fl.h-3, 12, 3);    // base
}

// --- Pinny, the one-eyed pineapple crab ---
function drawPinny(p) {
  const cx = p.x + p.w/2, top = p.y;
  const flick = p.hurt > 0 && (Math.floor(p.hurt/6)%2===0);
  if (flick) ctx.globalAlpha = 0.4;
  const legLift = Math.sin(p.walk)* (p.onGround?2:0);

  // soft contact shadow
  if (p.onGround) {
    ctx.fillStyle = 'rgba(10,5,20,0.28)';
    ctx.beginPath(); ctx.ellipse(cx, top + 20, 10, 2.6, 0, 0, 6.28); ctx.fill();
  }

  // squash & stretch: stretch while leaping, squash on landing (anchored at feet)
  let sy = 1;
  if (!p.onGround) sy = clampv(1 - p.vy*0.018, 0.86, 1.14);
  else if (p.squash > 0) sy = 0.8 + (8 - p.squash)*0.025;
  const sx = 2 - sy;

  ctx.save();
  ctx.translate(cx, top + 19);
  ctx.scale(p.face < 0 ? -sx : sx, sy);
  ctx.translate(0, -19);

  // Generated Pinny sprite (from the creator's pineapple-watermelon crab);
  // falls back to the code-drawn crab below if the art isn't loaded.
  if (sprites.pinny) {
    ctx.imageSmoothingEnabled = false;
    const sh = 30, sw = sh * sprites.pinny.width / sprites.pinny.height;
    // the generated art faces LEFT; the game treats +x as "forward", so
    // mirror the image (the surrounding transform already handles facing)
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(sprites.pinny, -sw/2, 20 - sh, sw, sh);
    ctx.restore();
    drawClawSwipe(p);
    ctx.restore();
    ctx.globalAlpha = 1;
    return;
  }

  // legs
  ctx.strokeStyle = '#c9791f'; ctx.lineWidth = 2;
  for (const dx of [-6,-2,2]) {
    ctx.beginPath(); ctx.moveTo(dx, 15); ctx.lineTo(dx-3, 19 + (dx%3===0?legLift:-legLift)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-dx, 15); ctx.lineTo(-dx+3, 19 + (dx%3===0?-legLift:legLift)); ctx.stroke();
  }

  // claws
  ctx.fillStyle = '#ff7a3c';
  ctx.beginPath(); ctx.arc(-10, 10, 4, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(10, 10, 4.5, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#e85f22';
  ctx.fillRect(-12, 7, 2, 3); ctx.fillRect(9, 6, 2, 3);

  // watermelon-slice "wings" either side of the head
  for (const sgn of [-1, 1]) {
    ctx.save(); ctx.translate(sgn*11, 8); ctx.rotate(sgn*0.55);
    ctx.fillStyle = '#2f9e44'; ctx.beginPath(); ctx.arc(0,0,6,Math.PI,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff5a5f'; ctx.beginPath(); ctx.arc(0,-0.4,4.4,Math.PI,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#3a2020'; ctx.fillRect(-1.6,-2,0.9,1.2); ctx.fillRect(0.7,-2,0.9,1.2);
    ctx.restore();
  }

  // pineapple body (rounded, shaded, outlined)
  ctx.fillStyle = '#ffc93c';
  roundRect(-9, 2, 18, 15, 6); ctx.fill();
  ctx.fillStyle = 'rgba(190,115,20,0.30)';
  roundRect(-9, 11, 18, 6, 5); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  roundRect(-7, 3, 6, 4, 3); ctx.fill();
  ctx.strokeStyle = '#a86c12'; ctx.lineWidth = 1.2;
  roundRect(-9, 2, 18, 15, 6); ctx.stroke();
  // pineapple diamond texture
  ctx.strokeStyle = '#e0a520'; ctx.lineWidth = 1;
  for (let yy=4; yy<15; yy+=4) {
    ctx.beginPath(); ctx.moveTo(-9, yy); ctx.lineTo(9, yy-3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-9, yy-3); ctx.lineTo(9, yy); ctx.stroke();
  }
  // leafy crown
  ctx.fillStyle = '#3ddc84';
  for (const lx of [-4,0,4]) {
    ctx.beginPath();
    ctx.moveTo(lx, 3); ctx.lineTo(lx-3, -6); ctx.lineTo(lx+3, -6);
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = '#2fb96a';
  ctx.beginPath(); ctx.moveTo(0,3); ctx.lineTo(-2,-8); ctx.lineTo(2,-8); ctx.closePath(); ctx.fill();

  // single big eye (one-eyed!)
  const blinking = p.blink < 6;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(2, 8, 5, 0, 6.28); ctx.fill();
  ctx.strokeStyle = '#c9791f'; ctx.lineWidth=1; ctx.stroke();
  if (!blinking) {
    ctx.fillStyle = '#22203a';
    ctx.beginPath(); ctx.arc(3.5, 8.5, 2.2, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(2.6, 7.6, 0.9, 0, 6.28); ctx.fill();
  } else {
    ctx.strokeStyle='#22203a'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(-1,8); ctx.lineTo(5,8); ctx.stroke();
  }
  // big toothy grin
  ctx.fillStyle = '#7a3b1a';
  ctx.beginPath(); ctx.arc(1, 12.5, 3.2, 0.05, Math.PI-0.05); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff6f8a';                                   // tongue
  ctx.beginPath(); ctx.arc(1, 13.6, 1.5, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#fff';                                      // teeth
  ctx.fillRect(-1.4, 11.4, 4.8, 1.3);

  drawClawSwipe(p);

  ctx.restore();
  ctx.globalAlpha = 1;
}

// Claw swipe overlay (drawn in Pinny's local space; +x is "in front" after face flip).
function drawClawSwipe(p) {
  if (p.atk <= 0) return;
  const prog = (14 - p.atk) / 14;                            // 0 → 1 over the swing
  const reach = Math.sin(Math.min(1, prog*1.25) * Math.PI) * 12;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 2;   // slash arc
  ctx.beginPath(); ctx.arc(11, 9, 9 + reach*0.4, -0.9, 0.9); ctx.stroke();
  ctx.strokeStyle = '#e85f22'; ctx.lineWidth = 3;                  // outstretched arm
  ctx.beginPath(); ctx.moveTo(7, 9); ctx.lineTo(12 + reach, 9); ctx.stroke();
  ctx.fillStyle = '#ff7a3c';                                       // big pincer
  ctx.beginPath(); ctx.arc(14 + reach, 9, 5, 0, 6.28); ctx.fill();
  ctx.strokeStyle = '#e85f22'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(14 + reach, 6); ctx.lineTo(20 + reach, 4);
  ctx.moveTo(14 + reach, 12); ctx.lineTo(20 + reach, 14);
  ctx.stroke();
}

// --- Hybrid crab enemies ---
// Every crab shares the same grumpy body; `kind` swaps the palette and adds
// a topper (flowers, mushroom cap, wooden crate). They all render in their
// own colours but the world layer keeps them grey until the colour is rescued.
const CRAB_PALETTE = {
  grey:    { shell:'#9a9a9a', shell2:'#7d7d7d', leg:'#666',    claw:'#8a8a8a', line:'#4d4d4d' },
  flower:  { shell:'#6fae4a', shell2:'#548a36', leg:'#4a7a34', claw:'#7dbe58', line:'#3c6b2a' },
  mushroom:{ shell:'#c9a06a', shell2:'#a67f49', leg:'#7a5a34', claw:'#b98f5a', line:'#6a4a2a' },
  crate:   { shell:'#a9713c', shell2:'#875a2c', leg:'#6a4420', claw:'#b5813c', line:'#5a3a1a' },
  red:     { shell:'#e0592f', shell2:'#b5401f', leg:'#8a3018', claw:'#ff7a3c', line:'#7a2a12' },
  sucker:  { shell:'#a89ab0', shell2:'#877a92', leg:'#6a5f75', claw:'#9a8ca6', line:'#4d4458' },
};

function drawCrab(c) {
  const wig = Math.sin(c.wig)*1.2;
  const kind = c.kind || 'grey';
  const P = CRAB_PALETTE[kind] || CRAB_PALETTE.grey;
  const look = (c.vx > 0 ? 0.6 : -0.6);
  const jit = (c.windup > 0) ? Math.sin(c.wig*4) * 1.6 : 0;   // shake while winding up to charge
  ctx.save();
  ctx.translate(c.x + c.w/2 + jit, c.y);

  // contact shadow + faint "drain" aura
  ctx.fillStyle = 'rgba(10,5,20,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 16, 10, 2.4, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = 'rgba(120,120,120,0.15)';
  ctx.beginPath(); ctx.arc(0, 8, 15, 0, 6.28); ctx.fill();

  // Paint-Sucker: obvious pulsing drain aura + colour streaks being inhaled
  if (kind === 'sucker') {
    const pu = 1 + Math.sin(c.wig*1.5)*0.15;
    ctx.strokeStyle = 'rgba(150,140,160,0.5)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 8, 18*pu, 0, 6.28); ctx.stroke();
    ctx.strokeStyle = 'rgba(150,140,160,0.25)';
    ctx.beginPath(); ctx.arc(0, 8, 24*pu, 0, 6.28); ctx.stroke();
    for (let i=0;i<4;i++) {                              // streaks spiralling inward
      const a = c.wig*0.8 + i*1.57, d = 22 - ((c.wig*10 + i*6) % 16);
      ctx.fillStyle = ['#ff8fa3','#ffd97a','#8fe0b0','#9fc8ff'][i];
      ctx.globalAlpha = 0.5;
      ctx.fillRect(Math.cos(a)*d - 1, 8 + Math.sin(a)*d*0.6 - 1, 2, 2);
    }
    ctx.globalAlpha = 1;
  }

  // Generated crab sprite (grey / paint-sucker / vine crab) with code fallback
  if (sprites[kind]) {
    ctx.imageSmoothingEnabled = false;
    const spr = sprites[kind];
    const sh = 22, sw = sh * spr.width / spr.height;
    ctx.drawImage(spr, -sw/2, 16 - sh, sw, sh);
    if (c.hitFlash > 0 && Math.floor(c.hitFlash/3) % 2 === 0) {   // armour flash
      ctx.globalAlpha = 0.5; ctx.fillStyle = '#fff';
      ctx.fillRect(-sw/2, 16 - sh, sw, sh); ctx.globalAlpha = 1;
    }
    ctx.restore();
    return;
  }

  // legs
  ctx.strokeStyle = P.leg; ctx.lineWidth = 2;
  for (const dx of [-7,-3]) {
    ctx.beginPath(); ctx.moveTo(dx,10); ctx.lineTo(dx-3,15+wig); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-dx,10); ctx.lineTo(-dx+3,15-wig); ctx.stroke();
  }
  // claws
  ctx.fillStyle = P.claw;
  ctx.beginPath(); ctx.arc(-10,7,3.5,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(10,7,3.5,0,6.28); ctx.fill();

  // shell (box for crate crabs, rounded otherwise)
  if (kind === 'crate') {
    ctx.fillStyle = P.shell; ctx.fillRect(-8, 0, 16, 12);
    ctx.strokeStyle = P.shell2; ctx.lineWidth = 1.2; ctx.strokeRect(-7.3, 0.6, 14.6, 10.8);
    ctx.beginPath(); ctx.moveTo(-8,4); ctx.lineTo(8,4); ctx.moveTo(-8,8); ctx.lineTo(8,8); ctx.stroke();
  } else {
    ctx.fillStyle = P.shell;  roundRect(-8, 1, 16, 11, 6); ctx.fill();
    ctx.fillStyle = P.shell2; roundRect(-8, 7, 16, 5, 4);  ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.18)'; roundRect(-6, 2, 6, 3, 2); ctx.fill();
    ctx.strokeStyle = 'rgba(22,20,26,0.5)'; ctx.lineWidth = 1;
    roundRect(-8, 1, 16, 11, 6); ctx.stroke();
  }

  // topper decorations (drawn above the eyes so nothing is hidden)
  if (kind === 'flower') {
    for (const fx of [-4.5, 4.5]) {
      ctx.fillStyle = '#ff6f9d';
      for (let a=0;a<5;a++){ const ang=a/5*6.28; ctx.beginPath(); ctx.arc(fx+Math.cos(ang)*2, -6+Math.sin(ang)*2, 1.4, 0, 6.28); ctx.fill(); }
      ctx.fillStyle = '#ffd23f'; ctx.beginPath(); ctx.arc(fx, -6, 1.3, 0, 6.28); ctx.fill();
    }
  } else if (kind === 'mushroom') {
    ctx.fillStyle = '#d63a3a'; ctx.beginPath(); ctx.arc(0, -5, 8, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-3,-7,1.2,0,6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(3,-8,1.1,0,6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-9.5,1,0,6.28); ctx.fill();
  }

  // eyes on stalks
  ctx.strokeStyle = P.shell2; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-3,2); ctx.lineTo(-3,-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,2);  ctx.lineTo(3,-2);  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3,-3,2,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(3,-3,2,0,6.28); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-3+look,-3,1,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(3+look,-3,1,0,6.28); ctx.fill();
  // grumpy mouth
  ctx.strokeStyle = P.line; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(0,10,2.2,Math.PI+0.1,-0.1); ctx.stroke();

  // white flash when hit but not yet defeated (armoured crate)
  if (c.hitFlash > 0 && Math.floor(c.hitFlash/3) % 2 === 0) {
    ctx.globalAlpha = 0.55; ctx.fillStyle = '#fff';
    roundRect(-9, -1, 18, 15, 6); ctx.fill(); ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// --- Grey Nest: a spiky drain-mound. Cracks appear as it takes hits. ---
function drawNest(n) {
  const cx = n.x + n.w/2, base = n.y + n.h;
  const pu = 1 + Math.sin(n.pulse)*0.12;
  const flash = n.flash > 0 && (Math.floor(n.flash/3) % 2 === 0);
  ctx.save();

  // drain aura + rising grey wisps
  ctx.strokeStyle = 'rgba(130,130,140,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, n.y + 8, 17*pu, 0, 6.28); ctx.stroke();
  ctx.fillStyle = 'rgba(160,160,170,0.5)';
  for (let i=0;i<3;i++) {
    const wy = base - ((n.pulse*14 + i*9) % 26);
    ctx.fillRect(cx - 6 + i*5, wy, 2, 2);
  }

  // mound body
  ctx.fillStyle = flash ? '#fff' : '#75757f';
  ctx.beginPath(); ctx.moveTo(cx - 11, base);
  ctx.quadraticCurveTo(cx - 11, n.y - 2, cx, n.y - 3);
  ctx.quadraticCurveTo(cx + 11, n.y - 2, cx + 11, base);
  ctx.closePath(); ctx.fill();
  // spikes
  ctx.fillStyle = flash ? '#eee' : '#5d5d66';
  for (const [dx, dy, s] of [[-7,-1,4],[0,-5,5],[7,-1,4]]) {
    ctx.beginPath(); ctx.moveTo(cx+dx-s*0.6, n.y+dy+4); ctx.lineTo(cx+dx, n.y+dy-s); ctx.lineTo(cx+dx+s*0.6, n.y+dy+4);
    ctx.closePath(); ctx.fill();
  }
  // angry glow core + cracks per hit taken
  ctx.fillStyle = '#3a3a44';
  ctx.beginPath(); ctx.arc(cx, n.y + 8, 4.5, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#c9c9d4';
  ctx.beginPath(); ctx.arc(cx, n.y + 8, 2, 0, 6.28); ctx.fill();
  ctx.strokeStyle = '#2e2e36'; ctx.lineWidth = 1.2;
  if (n.hp <= 2) { ctx.beginPath(); ctx.moveTo(cx-8, n.y+3); ctx.lineTo(cx-3, n.y+9); ctx.lineTo(cx-6, n.y+13); ctx.stroke(); }
  if (n.hp <= 1) { ctx.beginPath(); ctx.moveTo(cx+8, n.y+2); ctx.lineTo(cx+3, n.y+8); ctx.lineTo(cx+6, n.y+13); ctx.stroke(); }
  // outline
  ctx.strokeStyle = 'rgba(20,18,26,0.55)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 11, base);
  ctx.quadraticCurveTo(cx - 11, n.y - 2, cx, n.y - 3);
  ctx.quadraticCurveTo(cx + 11, n.y - 2, cx + 11, base);
  ctx.stroke();

  ctx.restore();
}

// --- General Ashclaw, the boss: a big spiky crab. ---
function drawBoss(bo) {
  const flash = bo.hurt > 0 && (Math.floor(bo.hurt/4) % 2 === 0);
  const wig = Math.sin(bo.wig) * 2;
  const look = (bo.vx > 0 ? 0.9 : -0.9);
  ctx.save();
  ctx.translate(bo.x + bo.w/2, bo.y);

  // contact shadow
  ctx.fillStyle = 'rgba(10,5,20,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 31, 22, 4, 0, 0, 6.28); ctx.fill();

  // legs
  ctx.strokeStyle = '#33303a'; ctx.lineWidth = 3;
  for (const dx of [-16,-9,9,16]) { ctx.beginPath(); ctx.moveTo(dx*0.7, 26); ctx.lineTo(dx, 30 + ((dx%2)?wig:-wig)); ctx.stroke(); }
  // big claws
  ctx.fillStyle = flash ? '#fff' : '#5a4a55';
  ctx.beginPath(); ctx.arc(-20, 20, 8, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(20, 20, 8, 0, 6.28); ctx.fill();
  ctx.fillStyle = flash ? '#fff' : '#46384a';
  ctx.fillRect(-26, 15, 6, 5); ctx.fillRect(20, 15, 6, 5);
  // horns
  ctx.fillStyle = flash ? '#fff' : '#241f2a';
  ctx.beginPath(); ctx.moveTo(-14,3); ctx.lineTo(-23,-13); ctx.lineTo(-7,-2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(14,3);  ctx.lineTo(23,-13);  ctx.lineTo(7,-2);  ctx.closePath(); ctx.fill();
  // shell
  ctx.fillStyle = flash ? '#fff' : '#4a4048'; roundRect(-20, 2, 40, 24, 10); ctx.fill();
  ctx.fillStyle = flash ? '#eee' : '#372f36'; roundRect(-20, 14, 40, 12, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(12,10,16,0.6)'; ctx.lineWidth = 1.5;
  roundRect(-20, 2, 40, 24, 10); ctx.stroke();
  // spikes along the top
  ctx.fillStyle = flash ? '#fff' : '#5a5058';
  for (const sx of [-9,0,9]) { ctx.beginPath(); ctx.moveTo(sx-3,3); ctx.lineTo(sx,-7); ctx.lineTo(sx+3,3); ctx.closePath(); ctx.fill(); }
  // angry glowing eyes
  ctx.fillStyle = '#ffd23f';
  ctx.beginPath(); ctx.arc(-7,10,3.4,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(7,10,3.4,0,6.28); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-7+look,10,1.6,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(7+look,10,1.6,0,6.28); ctx.fill();
  // brows + frown
  ctx.strokeStyle = '#17141a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-12,6); ctx.lineTo(-4,9); ctx.moveTo(12,6); ctx.lineTo(4,9); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,21,4,Math.PI+0.25,-0.25); ctx.stroke();

  ctx.restore();
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawHUD() {
  // dark plaques behind the HUD clusters (readability over any backdrop)
  ctx.fillStyle = 'rgba(24,12,28,0.38)';
  roundRect(4, 4, 116, 32, 8); ctx.fill();
  roundRect(VW-76, 4, 72, 32, 8); ctx.fill();

  // ---- COLOUR TIDE meter (top centre): fill, state ticks, state name ----
  // On narrow portrait screens the meter drops below the corner plaques.
  const st = tState();
  const barW = 108, barX = VW/2 - barW/2, barY = VW < 400 ? 44 : 9;
  ctx.fillStyle = 'rgba(0,0,0,0.32)'; roundRect(barX-3, barY-3, barW+6, 12, 6); ctx.fill();
  ctx.fillStyle = '#555'; roundRect(barX, barY, barW, 6, 3); ctx.fill();
  if (st === 3) {                                  // rainbow-animated fill during the rush
    const cyc = (timeT*1.5) % 1;
    const grd = ctx.createLinearGradient(barX,0,barX+barW,0);
    for (let i=0;i<=4;i++) grd.addColorStop(i/4, `hsl(${((cyc + i/4)%1)*360},90%,62%)`);
    ctx.fillStyle = grd; roundRect(barX, barY, barW, 6, 3); ctx.fill();
  } else {
    const grd = ctx.createLinearGradient(barX,0,barX+barW,0);
    grd.addColorStop(0,'#ff5f8d'); grd.addColorStop(.5,'#ffd23f'); grd.addColorStop(1,'#3ddc84');
    ctx.fillStyle = grd; roundRect(barX, barY, Math.max(4, barW*tideVis), 6, 3); ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.55)';        // state-threshold tick marks
  ctx.fillRect(barX + barW*0.25 - 0.5, barY-1, 1, 8);
  ctx.fillRect(barX + barW*0.55 - 0.5, barY-1, 1, 8);
  ctx.font = 'bold 7px system-ui'; ctx.textAlign = 'center';
  ctx.fillStyle = st === 3 ? `hsl(${(timeT*240)%360},95%,72%)` : TIDE_COLS[st];
  ctx.fillText('COLOUR TIDE: ' + TIDE_NAMES[st], VW/2, barY+13);
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.font = 'bold 7px system-ui';
  ctx.fillText(theme.name + '  ' + theme.stage, VW/2, barY+22);

  // Boss health bar
  if (boss && !boss.dead) {
    const bw = 168, bx = VW/2 - bw/2, by = VW < 400 ? 82 : 42;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px system-ui'; ctx.textAlign = 'center';
    ctx.fillText(boss.name, VW/2, by - 4);
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; roundRect(bx-3, by-3, bw+6, 12, 5); ctx.fill();
    ctx.fillStyle = '#3a1020'; roundRect(bx, by, bw, 6, 3); ctx.fill();
    ctx.fillStyle = '#ff2e46'; roundRect(bx, by, Math.max(0, bw*(boss.hp/boss.maxhp)), 6, 3); ctx.fill();
  }

  // Pinny portrait badge (top-left)
  drawPortrait(20, 20, 13);

  // Lives (hearts)
  for (let i=0;i<lives;i++) { ctx.fillStyle = '#ff3b5c'; heart(40 + i*13, 9, 4.4); }

  // Watermelon counter
  drawMelonIcon(43, 27, 4);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px system-ui'; ctx.textAlign = 'left';
  ctx.fillText('× ' + melons, 51, 31);

  // Star score + level timer (top-right)
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd23f'; ctx.font = 'bold 13px system-ui'; ctx.fillText('★ ' + score, VW-8, 17);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px system-ui'; ctx.fillText(fmtTime(timeT), VW-8, 31);

  // Level-name banner (fades out over its lifetime)
  if (bannerT > 0) drawBanner();
}

// Round portrait of Pinny for the HUD corner.
function drawPortrait(x, y, r) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fillStyle = '#2a1546'; ctx.fill();
  ctx.lineWidth = 2; ctx.strokeStyle = '#ffd23f'; ctx.stroke();
  ctx.beginPath(); ctx.arc(x, y, r-1.2, 0, 6.28); ctx.clip();
  // mini watermelon wings
  for (const sgn of [-1,1]) { ctx.fillStyle = '#ff5a5f';
    ctx.beginPath(); ctx.arc(x+sgn*7, y+2, 3.2, Math.PI, 0); ctx.closePath(); ctx.fill(); }
  // pineapple face
  ctx.fillStyle = '#ffc93c'; roundRect(x-6, y-3, 12, 11, 5); ctx.fill();
  ctx.fillStyle = '#3ddc84';
  for (const lx of [-3,0,3]) { ctx.beginPath(); ctx.moveTo(x+lx, y-2); ctx.lineTo(x+lx-2, y-8); ctx.lineTo(x+lx+2, y-8); ctx.closePath(); ctx.fill(); }
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(x+1, y+2, 3.2, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#22203a'; ctx.beginPath(); ctx.arc(x+2, y+2.4, 1.5, 0, 6.28); ctx.fill();
  ctx.restore();
}

function drawMelonIcon(x, y, r) {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#2f9e44'; ctx.beginPath(); ctx.arc(0,0,r,Math.PI,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff5a5f'; ctx.beginPath(); ctx.arc(0,-0.4,r-1.3,Math.PI,0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#3a2020'; ctx.fillRect(-1.4,-1.6,0.8,1); ctx.fillRect(0.7,-1.6,0.8,1);
  ctx.restore();
}

function fmtTime(t) {
  t = Math.floor(t); const m = (t/60)|0, s = t%60;
  return m + ':' + (s<10?'0':'') + s;
}

function drawBanner() {
  const alpha = bannerT < 25 ? bannerT/25 : 1;
  ctx.globalAlpha = alpha;
  const w = Math.min(220, VW - 24), h = 46, x = VW/2 - w/2, yy = VW < 400 ? 96 : 52;
  ctx.fillStyle = '#5a3418'; roundRect(x, yy, w, h, 9); ctx.fill();
  ctx.fillStyle = '#8a5a2c'; roundRect(x+3, yy+3, w-6, h-6, 7); ctx.fill();
  ctx.fillStyle = '#6e461f'; ctx.lineWidth = 1.5; roundRect(x+3, yy+3, w-6, h-6, 7); ctx.stroke();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffe9a8'; ctx.font = 'bold 16px system-ui'; ctx.fillText(theme.name, VW/2, yy+23);
  ctx.fillStyle = '#ffd23f'; ctx.font = 'bold 11px system-ui'; ctx.fillText('STAGE ' + theme.stage, VW/2, yy+37);
  ctx.globalAlpha = 1;
}

function heart(x,y,s) {
  ctx.beginPath();
  ctx.moveTo(x, y+s*0.3);
  ctx.bezierCurveTo(x, y, x-s, y, x-s, y+s*0.4);
  ctx.bezierCurveTo(x-s, y+s, x, y+s*1.2, x, y+s*1.5);
  ctx.bezierCurveTo(x, y+s*1.2, x+s, y+s, x+s, y+s*0.4);
  ctx.bezierCurveTo(x+s, y, x, y, x, y+s*0.3);
  ctx.fill();
}

/* ---------------- Game flow ---------------- */
const titleScreen = document.getElementById('titleScreen');
const endScreen = document.getElementById('endScreen');
const charScreen = document.getElementById('charScreen');

/* ---------------- Title splash & character select ---------------- */
// Splash art reuses the painted Emerald Falls backdrop; if it can't load
// (offline / strict CSP) the styled gradient screens stand on their own.
for (const id of ['splashImg', 'charSplash']) {
  const el = document.getElementById(id);
  el.onerror = () => { el.style.display = 'none'; };
  el.src = ART_BGS[0];
}

const CHARACTERS = [
  { id:'pinny', name:'Pinny',  tag:'Pineapple Watermelon Crab', emoji:'🍍', unlocked:true },
  { id:'yeti',  name:'Frosty', tag:'Yeti Crab',                 emoji:'❄️', unlocked:false },
  { id:'candy', name:'Lolly',  tag:'Candy Crab',                emoji:'🍭', unlocked:false },
  { id:'coco',  name:'Coco',   tag:'Coconut Crab',              emoji:'🥥', unlocked:false },
];
let selectedChar = 'pinny';

// Pinny's card portrait is rendered live by the game's own hero renderer,
// so it automatically shows the generated sprite once that loads.
function pinnyCardCanvas() {
  const c = document.createElement('canvas'); c.width = 96; c.height = 96;
  c.style.cssText = 'display:block;width:74px;height:74px;image-rendering:pixelated';
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(48, 30, 8, 48, 48, 70);
  grd.addColorStop(0, '#9fdcf0'); grd.addColorStop(1, '#2f86c9');
  g.fillStyle = grd; g.fillRect(0, 0, 96, 96);
  g.fillStyle = '#3ddc84'; g.fillRect(0, 82, 96, 14);        // grass line
  g.imageSmoothingEnabled = false;
  const prev = ctx; ctx = g;                                  // reuse the game renderer
  g.save(); g.translate(48, 22); g.scale(2.4, 2.4);
  drawPinny({ x:-9, y:0, w:18, h:18, vx:0, vy:0, onGround:true,
              face:1, blink:99, hurt:0, walk:0, atk:0, squash:0 });
  g.restore(); ctx = prev;
  return c;
}

function buildCharCards() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  for (const chr of CHARACTERS) {
    const card = document.createElement('div');
    card.className = 'char-card' + (chr.unlocked ? (chr.id === selectedChar ? ' selected' : '') : ' locked');
    const face = document.createElement('div'); face.className = 'face';
    if (chr.id === 'pinny') face.appendChild(pinnyCardCanvas());
    else face.textContent = chr.emoji;
    card.appendChild(face);
    const nm = document.createElement('div'); nm.className = 'cname'; nm.textContent = chr.name;
    const tg = document.createElement('div'); tg.className = 'ctag';
    tg.textContent = chr.unlocked ? chr.tag : 'Still grey — coming soon!';
    card.appendChild(nm); card.appendChild(tg);
    if (!chr.unlocked) {
      const lk = document.createElement('div'); lk.className = 'lock'; lk.textContent = '🔒';
      card.appendChild(lk);
      card.onclick = () => { card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); };
    } else {
      card.onclick = () => { selectedChar = chr.id; buildCharCards(); };
    }
    grid.appendChild(card);
  }
}

function openCharSelect() {
  titleScreen.classList.add('hidden');
  endScreen.classList.add('hidden');
  buildCharCards();
  charScreen.classList.remove('hidden');
}

const shopScreen = document.getElementById('shopScreen');

function startGame() {
  levelIndex = 0; score = 0; melons = 0; lives = 3;
  upg = { jump: 0, claw: 0, speed: 0, colour: 0 };
  // Optional level jump: open the game with #3 in the URL to start on level 3.
  const h = parseInt((location.hash || '').replace('#',''), 10);
  if (h >= 1 && h <= LEVELS.length) levelIndex = h - 1;
  titleScreen.classList.add('hidden');
  endScreen.classList.add('hidden');
  shopScreen.classList.add('hidden');
  charScreen.classList.add('hidden');
  buildLevel(levelIndex);
  running = true;
}

// Finishing a level opens the shop (spend watermelons) before the next one.
function finishLevel() {
  running = false;
  if (levelIndex + 1 < LEVELS.length) openShop();
  else endGame(true);
}
function advanceLevel() {
  levelIndex++;
  buildLevel(levelIndex);
  running = true;
}

/* ---------------- Shop ---------------- */
const SHOP = [
  { key:'jump',  ic:'⬆️', nm:'Jump Boost',   dc:'Leap higher',                        max:3, price:l=>8+l*7 },
  { key:'claw',  ic:'💥', nm:'Claw Power',    dc:'Longer, faster claw',                max:3, price:l=>8+l*7 },
  { key:'speed', ic:'💨', nm:'Speed Boots',   dc:'Run faster',                         max:3, price:l=>8+l*7 },
  { key:'colour',ic:'🌈', nm:'Colour Boost',  dc:'Start brighter, slow the grey drain',max:2, price:l=>10+l*8 },
  { key:'heal',  ic:'❤️', nm:'Extra Heart',   dc:'Restore one life',                   max:0, price:()=>6 },
];

function openShop() { renderShop(); shopScreen.classList.remove('hidden'); }

function renderShop() {
  document.getElementById('shopMelons').textContent = melons;
  const wrap = document.getElementById('shopItems');
  wrap.innerHTML = '';
  for (const it of SHOP) {
    const isHeal = it.key === 'heal';
    const lvl = isHeal ? 0 : upg[it.key];
    const maxed = isHeal ? (lives >= MAX_LIVES) : (lvl >= it.max);
    const cost = it.price(lvl);
    const card = document.createElement('div'); card.className = 'shop-card';
    const pips = isHeal ? '' :
      '<div class="pips">' + Array.from({length:it.max}, (_,i)=>`<span class="pip ${i<lvl?'on':''}"></span>`).join('') + '</div>';
    card.innerHTML = `<div class="ic">${it.ic}</div><div class="nm">${it.nm}</div><div class="dc">${it.dc}</div>${pips}`;
    const btn = document.createElement('button'); btn.className = 'buy';
    if (maxed) { btn.textContent = isHeal ? 'FULL' : 'MAX'; btn.classList.add('max'); btn.disabled = true; }
    else { btn.textContent = '🍉 ' + cost; btn.disabled = melons < cost; btn.onclick = () => buy(it); }
    card.appendChild(btn);
    wrap.appendChild(card);
  }
}

function buy(it) {
  const isHeal = it.key === 'heal';
  const lvl = isHeal ? 0 : upg[it.key];
  const maxed = isHeal ? (lives >= MAX_LIVES) : (lvl >= it.max);
  const cost = it.price(lvl);
  if (maxed || melons < cost) return;
  melons -= cost;
  if (isHeal) lives = Math.min(MAX_LIVES, lives + 1); else upg[it.key]++;
  renderShop();
}

function endGame(won) {
  running = false;
  shopScreen.classList.add('hidden');
  document.getElementById('endEmoji').textContent = won ? '🌈🍍' : '😵';
  document.getElementById('endTitle').textContent = won ? 'Colour Rescued!' : 'Oh no!';
  document.getElementById('endStat').textContent = '★ ' + score + '     🍉 ' + melons;
  document.getElementById('endSub').textContent = won
    ? 'Pinny beat General Ashclaw and brought all the colour back to Crabby World. You win! 🎉'
    : 'The grey crabs got Pinny. Give it another go!';
  endScreen.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click', openCharSelect);
document.getElementById('againBtn').addEventListener('click', openCharSelect);
document.getElementById('charStart').addEventListener('click', startGame);
document.getElementById('shopContinue').addEventListener('click', () => { shopScreen.classList.add('hidden'); advanceLevel(); });

/* ---------------- Main loop ---------------- */
function frame() {
  if (running) update();
  if (running || !titleScreen.classList.contains('hidden') || !endScreen.classList.contains('hidden')) {
    if (running) draw();
  }
  requestAnimationFrame(frame);
}
// draw an idle backdrop behind the title so the canvas isn't blank
score = 0; melons = 0; lives = 3;
buildLevel(0); applyTide(); draw();
requestAnimationFrame(frame);
</script>
</body>
