const CHARACTERS = [
  { id:'pinny', name:'Pinny',  tag:'Pineapple Watermelon Crab', emoji:'🍍', sprite:'pinny',      unlocked:true,  perk:'All-rounder' },
  { id:'yeti',  name:'Frosty', tag:'Yeti Crab',                 emoji:'❄️', sprite:'char_yeti',  unlocked:true,  perk:'+1 heart ❤️', perkHeart:true },
  { id:'candy', name:'Lolly',  tag:'Candy Crab',                emoji:'🍭', sprite:'char_candy', unlocked:true,  perk:'Higher jump ⬆️', perkJump:true },
  { id:'coco',  name:'Coco',   tag:'Coconut Crab',              emoji:'🥥', sprite:null,         unlocked:false },
];
let selectedChar = 'pinny';
let curHeroSprite = 'pinny';                 // which loaded sprite the hero renders as
// Whether each hero sprite's art needs mirroring so it faces the way it moves.
// Pinny's source art faces left (mirror = true); Frosty/Lolly were generated
// facing the other way, so they must NOT be mirrored.
const CHAR_FLIP = { pinny:true, char_yeti:true, char_candy:false };   // confirmed in play

function cardBaseCanvas() {
  const c = document.createElement('canvas'); c.width = 96; c.height = 96;
  c.style.cssText = 'display:block;width:74px;height:74px;image-rendering:pixelated';
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(48, 30, 8, 48, 48, 70);
  grd.addColorStop(0, '#9fdcf0'); grd.addColorStop(1, '#2f86c9');
  g.fillStyle = grd; g.fillRect(0, 0, 96, 96);
  g.fillStyle = '#3ddc84'; g.fillRect(0, 82, 96, 14);        // grass line
  g.imageSmoothingEnabled = false;
  return c;
}

// A character's portrait: its keyed sprite if loaded; Pinny's live code-drawn
// crab as a fallback; otherwise the emoji.
function charFace(chr) {
  const spr = sprites[chr.sprite];
  if (spr) {
    const c = cardBaseCanvas(), g = c.getContext('2d');
    const sh = 76, sw = sh * spr.width / spr.height;
    g.drawImage(spr, 48 - sw/2, 86 - sh, sw, sh);
    return c;
  }
  if (chr.id === 'pinny') {
    const c = cardBaseCanvas(), g = c.getContext('2d');
    const prev = ctx; ctx = g;
    g.save(); g.translate(48, 22); g.scale(2.4, 2.4);
    drawPinny({ x:-9, y:0, w:18, h:18, vx:0, vy:0, onGround:true,
                face:1, blink:99, hurt:0, walk:0, atk:0, squash:0, _spr:'pinny' });
    g.restore(); ctx = prev;
    return c;
  }
  const d = document.createElement('div'); d.textContent = chr.emoji; return d;
}

function buildCharCards() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  for (const chr of CHARACTERS) {
    const card = document.createElement('div');
    card.className = 'char-card' + (chr.unlocked ? (chr.id === selectedChar ? ' selected' : '') : ' locked');
    const face = document.createElement('div'); face.className = 'face';
    face.appendChild(charFace(chr));
    card.appendChild(face);
    const nm = document.createElement('div'); nm.className = 'cname'; nm.textContent = chr.name;
    const tg = document.createElement('div'); tg.className = 'ctag';
    tg.textContent = chr.unlocked ? chr.perk : 'Still grey — coming soon!';
    card.appendChild(nm); card.appendChild(tg);
    if (!chr.unlocked) {
      const lk = document.createElement('div'); lk.className = 'lock'; lk.textContent = '🔒';
      card.appendChild(lk);
      card.onclick = () => { card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); };
    } else {
      card.onclick = () => { selectedChar = chr.id; buildCharCards(); };
    }
    grid.appendChild(card);
  }
}

function openCharSelect() {
  scene = 'menu';
  titleScreen.classList.add('hidden');
  endScreen.classList.add('hidden');
  buildCharCards();
  charScreen.classList.remove('hidden');
}

const shopScreen = document.getElementById('shopScreen');

function startGame() {
  // Apply the chosen crab: its sprite plus a small signature perk.
  const chr = CHARACTERS.find(c => c.id === selectedChar && c.unlocked) || CHARACTERS[0];
  selectedChar = chr.id;
  curHeroSprite = chr.sprite || 'pinny';
  levelIndex = 0; score = 0; melons = 0;
  lives = 3;
  maxHp = 3 + (chr.perkHeart ? 1 : 0);   // Frosty's perk: an extra heart per life
  upg = { jump: chr.perkJump ? 1 : 0, claw: 0, speed: 0, colour: 0 };
  // Optional level jump: open the game with #3 in the URL to start on level 3.
  // '#test' opens the mechanics test room (colour drops, crystals, restorables).
  testMode = location.hash === '#test';
  const h = parseInt((location.hash || '').replace('#',''), 10);
  if (h >= 1 && h <= LEVELS.length) levelIndex = h - 1;
  titleScreen.classList.add('hidden');
  endScreen.classList.add('hidden');
  shopScreen.classList.add('hidden');
  charScreen.classList.add('hidden');
  scene = 'play';
  buildLevel(levelIndex);
  running = true;
}

// Finishing a level opens the shop (spend watermelons) before the next one.
function finishLevel() {
  running = false;
  if (testMode) { buildLevel(levelIndex); running = true; return; }   // test room just loops
  if (levelIndex + 1 < LEVELS.length) openShop();
  else endGame(true);
}
function advanceLevel() {
  levelIndex++;
  buildLevel(levelIndex);
  running = true;
}

/* ---------------- Shop ---------------- */
const SHOP = [
  { key:'jump',  ic:'⬆️', nm:'Jump Boost',   dc:'Leap higher',                        max:3, price:l=>8+l*7 },
  { key:'claw',  ic:'💥', nm:'Claw Power',    dc:'Longer, faster claw',                max:3, price:l=>8+l*7 },
  { key:'speed', ic:'💨', nm:'Speed Boots',   dc:'Run faster',                         max:3, price:l=>8+l*7 },
  { key:'colour',ic:'🌈', nm:'Colour Boost',  dc:'Start brighter, slow the grey drain',max:2, price:l=>10+l*8 },
  { key:'heal',  ic:'❤️', nm:'Extra Heart',   dc:'One more heart, every life',         max:0, price:()=>6 },
];

function openShop() { renderShop(); shopScreen.classList.remove('hidden'); }

function renderShop() {
  document.getElementById('shopMelons').textContent = melons;
  const wrap = document.getElementById('shopItems');
  wrap.innerHTML = '';
  for (const it of SHOP) {
    const isHeal = it.key === 'heal';
    const lvl = isHeal ? 0 : upg[it.key];
    const maxed = isHeal ? (maxHp >= MAX_HP) : (lvl >= it.max);
    const cost = it.price(lvl);
    const afford = melons >= cost;
    const card = document.createElement('div');
    card.className = 'shop-card' + (maxed ? ' maxed' : afford ? ' afford' : ' cant');
    const pips = isHeal ? '' :
      '<div class="pips">' + Array.from({length:it.max}, (_,i)=>`<span class="pip ${i<lvl?'on':''}"></span>`).join('') + '</div>';
    const price = maxed ? `<div class="buy max">${isHeal ? 'FULL' : 'MAX'}</div>`
                        : `<div class="buy">🍉 ${cost}</div>`;
    card.innerHTML = `<div class="ic">${it.ic}</div><div class="nm">${it.nm}</div><div class="dc">${it.dc}</div>${pips}${price}`;
    // The WHOLE card is the buy button (kid-friendly big tap target).
    if (!maxed) card.onclick = () => buy(it, card);
    wrap.appendChild(card);
  }
}

function buy(it, card) {
  const isHeal = it.key === 'heal';
  const lvl = isHeal ? 0 : upg[it.key];
  const maxed = isHeal ? (maxHp >= MAX_HP) : (lvl >= it.max);
  const cost = it.price(lvl);
  if (maxed || melons < cost) {           // can't afford → wiggle, no purchase
    if (card) { card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); }
    return;
  }
  melons -= cost;
  if (isHeal) { maxHp = Math.min(MAX_HP, maxHp + 1); hp = maxHp; } else upg[it.key]++;
  renderShop();
}

function endGame(won) {
  running = false;
  shopScreen.classList.add('hidden');
  document.getElementById('endEmoji').textContent = won ? '🌈🍍' : '😵';
  document.getElementById('endTitle').textContent = won ? 'Colour Rescued!' : 'Oh no!';
  document.getElementById('endStat').textContent = '★ ' + score + '     🍉 ' + melons;
  document.getElementById('endSub').textContent = won
    ? 'Pinny beat General Ashclaw and brought all the colour back to Crabby World. You win! 🎉'
    : 'The grey crabs got Pinny. Give it another go!';
  endScreen.classList.remove('hidden');
}

/* ==================================================================
   HOME SCENE — Pip's beach house (the DKC-style opening room).
   Flow: Title -> Character Select -> HOME -> walk out the right door
   -> World 1-1. Self-contained (its own build/update/draw); add more
   scenes the same way and give them a case in frame().
   ================================================================== */

// Room geometry, derived from the current resolution so it survives rotation.
// TODO: tune floorY (ground line) and the door position/size to the final art.
function homeGeom() {
  const w = Math.max(VW, Math.round(VH * 16 / 9));   // room is one 16:9 backdrop wide
  return { w, floorY: Math.round(VH * 0.80), doorX: w - 64, doorW: 64 };
}

function enterHome() {
  if (location.hash === '#test') { startGame(); return; }   // test room skips Home
  const chr = CHARACTERS.find(c => c.id === selectedChar && c.unlocked) || CHARACTERS[0];
  selectedChar = chr.id; curHeroSprite = chr.sprite || 'pinny';
  titleScreen.classList.add('hidden'); endScreen.classList.add('hidden');
  shopScreen.classList.add('hidden'); charScreen.classList.add('hidden');
  const g = homeGeom();
  player = makePlayer(Math.round(g.w * 0.20), g.floorY - 18);   // TODO: tune Pip's spawn point
  player.onGround = true; player.face = 1;
  cam = { x: 0, y: 0 };
  fade = 1; fadeTarget = 0; fadeThen = null;                    // fade in on arrival
  scene = 'home';
}

// Walking out the door loads World 1-1 (the first real level).
function startWorld1() {
  startGame();            // startGame sets scene='play' and builds level 0 = World 1-1
  fadeTarget = 0;         // ...then fade the level in (fade is still 1 from the wipe)
}

function updateHome() {
  stepFade();
  if (scene !== 'home') return;          // a transition fired — stop here
  timeT += 1/60;
  const p = player, g = homeGeom();
  const leaving = fadeTarget >= 1;       // fading out to World 1-1: freeze input
  if (!leaving) {
    if (keys.left)  { p.vx -= MOVE; p.face = -1; }             // TODO: tune walk speed (MOVE/MAXVX)
    if (keys.right) { p.vx += MOVE; p.face = 1; }
    if (!keys.left && !keys.right) p.vx *= FRICT;
    p.vx = Math.max(-MAXVX, Math.min(MAXVX, p.vx));
    if (Math.abs(p.vx) > 0.3) p.walk += 0.25;                  // drives the walk animation
    if ((keys.jump || keys.jumpQueued) && p.onGround) { p.vy = -JUMP_V; p.onGround = false; }  // jump optional
    keys.jumpQueued = false;
  } else { p.vx *= 0.85; }

  p.vy += GRAV; if (p.vy > 12) p.vy = 12;
  p.x += p.vx; p.y += p.vy;
  if (p.y + p.h >= g.floorY) { if (!p.wasGround) p.squash = 8; p.y = g.floorY - p.h; p.vy = 0; p.onGround = true; }
  else p.onGround = false;
  if (p.squash > 0) p.squash--; p.wasGround = p.onGround;
  if (--p.blink < 0) p.blink = 120 + Math.random()*120;

  if (p.x < 8) { p.x = 8; if (p.vx < 0) p.vx = 0; }             // can't leave on the left
  if (p.x + p.w > g.w - 6) p.x = g.w - 6 - p.w;

  // Doorway trigger: reach the door moving right -> wipe to black -> World 1-1.
  if (!leaving && p.face > 0 && p.x + p.w > g.doorX + 10) { fadeTarget = 1; fadeThen = startWorld1; }

  cam.x = Math.max(0, Math.min(g.w - VW, p.x + p.w/2 - VW/2));  // keep Pip in frame
  cam.y = 0;
}

function drawHome() {
  const g = homeGeom();
  worldCanvas.style.filter = 'none';                           // Home is always full colour
  ctx = worldCtx; ctx.imageSmoothingEnabled = false;
  ctx.save(); ctx.translate(-Math.round(cam.x), 0);
  if (homeBgImg) ctx.drawImage(homeBgImg, 0, 0, g.w, VH);      // Higgsfield house art
  else drawHomeRoom(g);                                        // hand-drawn fallback room
  ctx.restore();

  ctx = fgCtx; ctx.clearRect(0, 0, VW, VH);
  ctx.save(); ctx.translate(-Math.round(cam.x), 0);
  const ax = g.doorX + 24, ay = g.floorY - 58 + Math.sin(timeT*4)*3;   // bobbing "go" arrow
  ctx.fillStyle = '#ffd23f'; ctx.strokeStyle = '#7a4a10'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax+15, ay+8); ctx.lineTo(ax, ay+16); ctx.closePath(); ctx.fill(); ctx.stroke();
  drawPinny(player);
  ctx.restore();
  ctx.fillStyle = 'rgba(0,0,0,0.32)'; ctx.fillRect(0, VH-16, VW, 16);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px system-ui'; ctx.textAlign = 'center';
  ctx.fillText('Walk out the door to start! →', VW/2, VH-5);
  drawFade(ctx);
}

// Hand-drawn cutaway of Pip's pineapple beach house — the fallback used until
// the Higgsfield background is wired into HOME_BG. Drawn in room space (0..g.w).
function drawHomeRoom(g) {
  const W = g.w, F = g.floorY, D = g.doorX;
  const sky = ctx.createLinearGradient(0, 0, 0, F);
  sky.addColorStop(0, '#7ec2ff'); sky.addColorStop(1, '#d4ecff');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, F);
  // outdoors through the doorway: sea, sparkle, palm, sandy path
  ctx.fillStyle = '#3f9bd6'; ctx.fillRect(D, F-36, W-D, 36);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (let i=0;i<6;i++) ctx.fillRect(D+8+i*13, F-28 + ((Math.sin(timeT*2+i)*3)|0), 6, 2);
  ctx.fillStyle = '#6a4420'; ctx.fillRect(W-26, F-64, 5, 28);
  ctx.fillStyle = '#2fb96a';
  for (const a of [-0.6,-0.2,0.25,0.6]) { ctx.save(); ctx.translate(W-24, F-64); ctx.rotate(a); ctx.fillRect(0,-3,20,6); ctx.restore(); }
  ctx.fillStyle = '#e8d199'; ctx.fillRect(D, F, W-D, VH-F);
  // interior wall (pineapple) up to the doorway
  ctx.fillStyle = '#e0a83c'; ctx.fillRect(0, 0, D, F);
  ctx.fillStyle = 'rgba(150,90,20,0.22)';
  for (let yy=10; yy<F; yy+=18) for (let xx=10; xx<D; xx+=22) { ctx.beginPath(); ctx.moveTo(xx,yy); ctx.lineTo(xx+11,yy-6); ctx.lineTo(xx+22,yy); ctx.lineTo(xx+11,yy+6); ctx.closePath(); ctx.fill(); }
  ctx.fillStyle = '#9c6b1e'; ctx.fillRect(0, F-6, D, 6);
  // round window with sea sparkle
  const wx = D*0.42, wy = F*0.32, wr = Math.min(28, D*0.12);
  ctx.fillStyle = '#8fd0ff'; ctx.beginPath(); ctx.arc(wx, wy, wr, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#3f9bd6'; ctx.fillRect(wx-wr, wy, wr*2, wr);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; for (let i=0;i<4;i++) ctx.fillRect(wx-wr+7+i*7, wy+4+((Math.sin(timeT*2+i)*2)|0), 5, 2);
  ctx.strokeStyle = '#7a4a10'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(wx, wy, wr, 0, 6.28); ctx.stroke();
  // wooden floor
  ctx.fillStyle = '#b5763d'; ctx.fillRect(0, F, D, VH-F);
  ctx.strokeStyle = 'rgba(90,50,20,0.4)'; ctx.lineWidth = 1;
  for (let xx=0; xx<D; xx+=26) { ctx.beginPath(); ctx.moveTo(xx, F); ctx.lineTo(xx, VH); ctx.stroke(); }
  ctx.fillStyle = 'rgba(255,240,180,0.25)'; ctx.fillRect(0, F, D, 2);
  // leaf-bed
  const bx = 14, bw = Math.min(66, D*0.26);
  ctx.fillStyle = '#2fb96a'; roundRect(bx, F-14, bw, 14, 5); ctx.fill();
  ctx.fillStyle = '#3ddc84'; roundRect(bx, F-20, bw, 10, 5); ctx.fill();
  ctx.fillStyle = '#fff2c4'; roundRect(bx+bw-16, F-24, 14, 8, 4); ctx.fill();
  // table of watermelon snacks
  const tx = D*0.56, tw = Math.min(52, D*0.2);
  ctx.fillStyle = '#8a5a2c'; ctx.fillRect(tx, F-18, tw, 4); ctx.fillRect(tx+2, F-14, 3, 14); ctx.fillRect(tx+tw-5, F-14, 3, 14);
  for (let i=0;i<3;i++) { const mx = tx+8+i*14;
    ctx.fillStyle = '#2f9e44'; ctx.beginPath(); ctx.arc(mx, F-20, 5, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff5a5f'; ctx.beginPath(); ctx.arc(mx, F-21, 3.4, Math.PI, 0); ctx.closePath(); ctx.fill(); }
  // shells / clutter
  ctx.fillStyle = '#ffd9b0'; ctx.beginPath(); ctx.arc(D*0.30, F-6, 5, Math.PI, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffb0c0'; ctx.beginPath(); ctx.arc(D*0.74, F-5, 4, Math.PI, 0); ctx.closePath(); ctx.fill();
  // doorway post + opening shadow
  ctx.fillStyle = '#7a4a10'; ctx.fillRect(D-4, 0, 6, F);
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(D+2, 0, 10, F);
}

document.getElementById('startBtn').addEventListener('click', openCharSelect);
document.getElementById('againBtn').addEventListener('click', openCharSelect);
document.getElementById('charStart').addEventListener('click', enterHome);   // GO! -> Home scene
document.getElementById('shopContinue').addEventListener('click', () => { shopScreen.classList.add('hidden'); advanceLevel(); });

/* ---------------- Main loop ---------------- */
function frame() {
  if (scene === 'home') { updateHome(); drawHome(); }
  else if (running) { update(); draw(); }
  requestAnimationFrame(frame);
}
// draw an idle backdrop behind the title so the canvas isn't blank
score = 0; melons = 0; lives = 3; hp = maxHp = 3;
buildLevel(0); applyTide(); draw();
requestAnimationFrame(frame);
</script>
